<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EL SEGARRO RUNNER</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a14;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      color: white;
      width: 100vw;
      height: 100vh;
      position: fixed;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #0a0a14;
    }

    #hud {
      position: absolute;
      top: 2%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4vw;
      background: rgba(0, 0, 0, 0.85);
      padding: 1.8vh 3.5vw;
      border-radius: 3vh;
      border: 2px solid #ffd166;
      box-shadow: 0 0 15px rgba(255, 209, 102, 0.7);
      font-size: 2.8vh;
      font-weight: bold;
      z-index: 10;
      white-space: nowrap;
      backdrop-filter: blur(5px);
    }

    #score-display, #record-display {
      position: absolute;
      top: 2%;
      font-size: 3.2vh;
      font-weight: bold;
      color: #ffd166;
      text-shadow: 0 0 8px rgba(255, 209, 102, 0.9), 0 0 15px rgba(255, 77, 77, 0.5);
      font-family: 'Courier New', monospace;
      z-index: 10;
      text-align: center;
      width: 30%;
    }

    #score-display { right: 3%; }
    #record-display { left: 3%; }

    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.92);
      color: #ff4d4d;
      padding: 4vh 6vw;
      border-radius: 4vh;
      border: 4px solid #ff4d4d;
      text-align: center;
      display: none;
      z-index: 20;
      box-shadow: 
        0 0 30px rgba(255, 77, 77, 0.9),
        0 0 50px rgba(255, 209, 102, 0.5);
      width: 85%;
      max-width: 75vw;
    }

    #game-over h2 {
      font-size: 5vh;
      margin-bottom: 4vh;
      text-shadow: 0 0 15px rgba(255, 77, 77, 0.95);
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #ff4d4d, #ffd166, #ff4d4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-stroke: 1px black;
    }

    #game-over p {
      font-size: 3.5vh;
      margin-bottom: 6vh;
      color: #ffd166;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 10px rgba(255, 209, 102, 0.8);
    }

    #restart-btn {
      background: linear-gradient(45deg, #06d6a0, #118ab2, #06d6a0);
      color: white;
      border: none;
      padding: 3vh 10vw;
      font-size: 4.5vh;
      border-radius: 3vh;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
      box-shadow: 0 4px 20px rgba(6, 214, 160, 0.6);
      width: 90%;
      margin: 0 auto;
      display: block;
    }

    #restart-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 25px rgba(6, 214, 160, 0.8);
    }

    #restart-btn:active {
      transform: scale(0.98);
    }

    #instructions {
      position: absolute;
      bottom: 3%;
      color: #a8dadc;
      font-size: 2.4vh;
      text-align: center;
      width: 95%;
      font-family: 'Courier New', monospace;
      background: rgba(0, 0, 0, 0.6);
      padding: 1.5vh 3vw;
      border-radius: 2.5vh;
      z-index: 10;
      text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
    }

    #title-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f0c29, #1a1a2e, #0f0c29);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
      gap: 6vh;
      touch-action: auto;
    }

    #title-screen h1 {
      font-size: 9vh;
      font-weight: bold;
      color: #ffd166;
      text-shadow: 
        0 0 15px rgba(255, 209, 102, 0.9),
        0 0 30px rgba(255, 77, 77, 0.7),
        0 0 45px rgba(255, 209, 102, 0.5);
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
      animation: pulseTitle 2s infinite;
      text-align: center;
      padding: 0 5vw;
      background: linear-gradient(45deg, #ffd166, #ff4d4d, #ffd166);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes pulseTitle {
      0%, 100% { transform: scale(1); text-shadow: 0 0 15px rgba(255, 209, 102, 0.9), 0 0 30px rgba(255, 77, 77, 0.7); }
      50% { transform: scale(1.07); text-shadow: 0 0 25px rgba(255, 209, 102, 1), 0 0 50px rgba(255, 77, 77, 0.9), 0 0 75px rgba(255, 209, 102, 0.7); }
    }

    #start-btn {
      background: linear-gradient(45deg, #ff4d4d, #ffd166, #ff4d4d);
      color: white;
      border: none;
      padding: 4vh 12vw;
      font-size: 6vh;
      border-radius: 4vh;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
      box-shadow: 
        0 0 25px rgba(255, 77, 77, 0.8),
        0 0 50px rgba(255, 209, 102, 0.6);
      letter-spacing: 2px;
    }

    #start-btn:hover {
      transform: scale(1.1);
      box-shadow: 
        0 0 35px rgba(255, 77, 77, 0.95),
        0 0 70px rgba(255, 209, 102, 0.8);
    }

    #start-btn:active {
      transform: scale(0.98);
    }

    #carril-indicator {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 5vw;
      height: 1.2vh;
      background: linear-gradient(90deg, #4cc9f0, #4361ee, #3a0ca3);
      border-radius: 1vh;
      box-shadow: 0 0 10px rgba(76, 201, 240, 0.8);
      transition: left 0.25s ease-out, width 0.2s;
      z-index: 5;
    }

    #audio-message {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(90deg, #ffd166, #ff9e6d, #ffd166);
      color: #0a0a14;
      padding: 2vh 5vw;
      border-radius: 3vh;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 3vh;
      display: none;
      z-index: 15;
      box-shadow: 0 0 15px rgba(255, 209, 102, 0.9);
      animation: pulseAudio 1.5s infinite;
    }

    @keyframes pulseAudio {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div>
        <span>❤️</span> <span id="vidas-count">1</span>
      </div>
      <div>
        <span>🚬</span> <span id="cigarros-count">0</span>/5
      </div>
    </div>
    <div id="score-display">SCORE: 0</div>
    <div id="record-display">RÉCORD: 0</div>
    <canvas id="game-canvas"></canvas>
    
    <div id="carril-indicator"></div>
    
    <div id="game-over">
      <h2>¡RECISTA!</h2>
      <p id="final-score">SCORE: 0</p>
      <p id="best-record">MEJOR RÉCORD: 0</p>
      <button id="restart-btn">OTRA VEZ, AMIGOO</button>
    </div>
    
    <div id="instructions">
      <p>← → : Carriles | ↑ : Saltar | ↓ : Agacharse | 3↓ rápidos: EURO</p>
    </div>

    <div id="title-screen">
      <h1>EL SEGARRO RUNNER</h1>
      <button id="start-btn">EMPEZAR A FUMAR</button>
    </div>

    <div id="audio-message">🔊 ¡MUSIQUILLA ÁRABE ACTIVADA!</div>
  </div>

  <script>
    // ==================== CONFIGURACIÓN DE ALTA RESOLUCIÓN ====================
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    
    const dpr = window.devicePixelRatio || 1;
    
    function resizeCanvas() {
      // Usar tamaño CSS × DPR para alta resolución
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.scale(dpr, dpr);
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // NUEVAS funciones de conversión - coordenadas CSS
    function virtualX(x) {
      return (x / 800) * canvas.clientWidth;
    }

    function virtualY(y) {
      return (y / 600) * canvas.clientHeight;
    }

    function virtualW(w) {
      return (w / 800) * canvas.clientWidth;
    }

    function virtualH(h) {
      return (h / 600) * canvas.clientHeight;
    }

    // ==================== ELEMENTOS DEL DOM ====================
    const scoreDisplay = document.getElementById('score-display');
    const recordDisplay = document.getElementById('record-display');
    const vidasDisplay = document.getElementById('vidas-count');
    const cigarrosDisplay = document.getElementById('cigarros-count');
    const gameOverPanel = document.getElementById('game-over');
    const finalScoreDisplay = document.getElementById('final-score');
    const bestRecordDisplay = document.getElementById('best-record');
    const restartBtn = document.getElementById('restart-btn');
    const titleScreen = document.getElementById('title-screen');
    const startBtn = document.getElementById('start-btn');
    const audioMessage = document.getElementById('audio-message');
    const carrilIndicator = document.getElementById('carril-indicator');
    const instructions = document.getElementById('instructions');

    const esMovil = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                    ('ontouchstart' in window || navigator.maxTouchPoints > 0);
    
    if (esMovil) {
      instructions.innerHTML = '<p>← → : Carriles | ↑ : Saltar | ↓ : Agacharse | 3↓ rápidos: EURO</p>';
    }

    // ==================== CONSTANTES DEL JUEGO ====================
    const CARRILES = { IZQUIERDA: 0, CENTRO: 1, DERECHA: 2 };
    const POS_X_CARRIL_VIRTUAL = [200, 400, 600];
    const POS_Y_BASE_VIRTUAL = 350;
    const CENTRO_X_VIRTUAL = 400;
    const CENTRO_Y_VIRTUAL = 300;
    
    // SWIPE ULTRA-SENSIBLE (VALIDADO)
    const umbralSwipe = 20;
    const umbralSwipeEURO = 40;
    const tiempoMaximoSwipe = 400;

    // ==================== CLASES (TEXTOS INSTANTÁNEOS) ====================
    class TextoEmergente {
      constructor(texto, x, y, color = '#ffd166', opciones = {}) {
        this.texto = texto;
        this.x = x;
        this.y = y;
        this.color = color;
        this.vida = opciones.gigante ? 100 : 70;
        this.velocidadY = -2;
        this.opacidad = 1.0;
        this.escala = opciones.gigante ? 1.8 : 1.0;
        this.vibrar = opciones.vibrar || false;
        this.tiempo = 0;
      }
      
      actualizar() {
        this.y += this.velocidadY;
        this.vida--;
        this.tiempo++;
      }
      
      dibujar(ctx) {
        ctx.save();
        ctx.globalAlpha = this.opacidad;

        let offsetX = this.x;
        if (this.vibrar) {
          offsetX += Math.sin(this.tiempo * 15) * 1.5;
        }
        
        ctx.font = `bold ${Math.floor(30 * this.escala)}px 'Courier New', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 4 * this.escala;
        ctx.lineJoin = 'round';
        ctx.strokeText(this.texto, offsetX, this.y);
        
        ctx.fillStyle = this.color;
        ctx.fillText(this.texto, offsetX, this.y);
        
        ctx.restore();
      }
      
      estaMuerto() {
        return this.vida <= 0;
      }
    }

    class ParticulaHumo {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = -0.5 - Math.random() * 0.3;
        this.radio = 1.5 + Math.random() * 2;
        this.opacidad = 0.7;
        this.vida = 40 + Math.random() * 20;
      }
      
      actualizar() {
        this.x += this.vx;
        this.y += this.vy;
        this.radio *= 0.98;
        this.opacidad *= 0.97;
        this.vida--;
      }
      
      dibujar(ctx) {
        ctx.globalAlpha = this.opacidad;
        ctx.fillStyle = `rgba(200, 200, 200, ${this.opacidad})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radio, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
      
      estaMuerta() {
        return this.vida <= 0 || this.radio < 0.5;
      }
    }

    // ==================== AUDIO ====================
    let audioContext;
    let audioHabilitado = false;
    let musicaPlaying = false;

    function initAudio() {
      if (audioHabilitado) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        startMusicaArabe();
        audioHabilitado = true;
        audioMessage.style.display = 'block';
        setTimeout(() => audioMessage.style.display = 'none', 3000);
      } catch (e) {
        console.log('Audio no disponible:', e);
      }
    }

    function startMusicaArabe() {
      if (!audioContext || musicaPlaying) return;
      musicaPlaying = true;
      
      const notas = [110, 130.81, 146.83, 164.81, 196.00];
      let indice = 0;
      
      function tocar() {
        if (!musicaPlaying || !audioContext) return;
        
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.type = 'sine';
        osc.frequency.value = notas[indice];
        gain.gain.value = 0.06;
        
        osc.start();
        osc.stop(audioContext.currentTime + 2.0);
        
        gain.gain.setValueAtTime(0, audioContext.currentTime);
        gain.gain.linearRampToValueAtTime(0.06, audioContext.currentTime + 0.1);
        gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 1.9);
        
        indice = (indice + 1) % notas.length;
        setTimeout(tocar, 2400);
      }
      
      tocar();
    }

    function stopMusicaArabe() { musicaPlaying = false; }

    function crearSonido(frecuencia, tipo, duracion, volumen = 0.3) {
      return () => {
        if (!audioContext) return;
        try {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          
          osc.connect(gain);
          gain.connect(audioContext.destination);
          
          osc.type = tipo || 'sine';
          osc.frequency.value = frecuencia;
          gain.gain.value = volumen;
          
          osc.start();
          osc.stop(audioContext.currentTime + (duracion || 0.2));
          
          if (duracion) {
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duracion);
          }
        } catch (e) {
          console.log('Error sonido:', e);
        }
      };
    }

    const sonidoSuspiro = crearSonido(300, 'sine', 0.4, 0.15);
    const sonidoChoque = crearSonido(120, 'square', 0.15, 0.4);
    const sonidoSalto = crearSonido(450, 'sine', 0.12, 0.25);
    const sonidoTos = () => {
      if (!audioContext) return;
      crearSonido(200, 'square', 0.3, 0.6)();
      setTimeout(() => crearSonido(100, 'sawtooth', 0.5, 0.3)(), 100);
    };
    const sonidoEuro = () => {
      if (!audioContext) return;
      crearSonido(800, 'sine', 0.1, 0.3)();
      setTimeout(() => crearSonido(600, 'sine', 0.1, 0.25)(), 100);
    };
    const sonidoCerdo = crearSonido(180, 'sawtooth', 0.3, 0.4);

    // ==================== GESTOS MÓVIL (ULTRA-SENSIBLE + EURO 3↓) ====================
    let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;
    let touchStartTime = 0;
    
    let contadorSwipesAbajo = 0;
    let tiempoPrimerSwipeAbajo = 0;
    let timeoutResetEURO = null;
    
    function resetContadorEURO() {
      contadorSwipesAbajo = 0;
      tiempoPrimerSwipeAbajo = 0;
      if (timeoutResetEURO) {
        clearTimeout(timeoutResetEURO);
        timeoutResetEURO = null;
      }
    }

    canvas.addEventListener('touchstart', (e) => {
      if (juego.estado !== 'jugando') return;
      
      touchStartTime = Date.now();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      if (juego.estado !== 'jugando') return;
      
      const ahora = Date.now();
      const duracionSwipe = ahora - touchStartTime;
      
      touchEndX = e.changedTouches[0].clientX;
      touchEndY = e.changedTouches[0].clientY;
      
      if (duracionSwipe <= tiempoMaximoSwipe) {
        detectarSwipe();
      }
      
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (juego.estado === 'jugando') e.preventDefault();
    }, { passive: false });

    function detectarSwipe() {
      const diffX = touchEndX - touchStartX;
      const diffY = touchEndY - touchStartY;
      
      if (Math.abs(diffX) > Math.abs(diffY)) {
        resetContadorEURO();
        
        if (diffX > umbralSwipe && jugador.carril < 2) {
          jugador.carril++;
        } else if (diffX < -umbralSwipe && jugador.carril > 0) {
          jugador.carril--;
        }
        return;
      }
      
      if (diffY > umbralSwipe && diffY < umbralSwipeEURO && jugador.enSuelo && !jugador.agachado) {
        resetContadorEURO();
        jugador.agachado = true;
        jugador.altoVirtual = 40;
        return;
      }
      
      if (diffY < -umbralSwipe && jugador.enSuelo) {
        resetContadorEURO();
        jugador.vy = -15;
        jugador.enSuelo = false;
        jugador.saltando = true;
        sonidoSalto();
        return;
      }
      
      if (diffY >= umbralSwipeEURO) {
        const ahora = Date.now();
        
        if (contadorSwipesAbajo === 0) {
          tiempoPrimerSwipeAbajo = ahora;
          contadorSwipesAbajo = 1;
        } else if (ahora - tiempoPrimerSwipeAbajo < 1000) {
          contadorSwipesAbajo++;
          
          if (contadorSwipesAbajo >= 3 && !jugador.trucoEuro.usado) {
            activarTrucoEuro();
            resetContadorEURO();
            return;
          }
        } else {
          resetContadorEURO();
          contadorSwipesAbajo = 1;
          tiempoPrimerSwipeAbajo = ahora;
        }
        
        if (timeoutResetEURO) clearTimeout(timeoutResetEURO);
        timeoutResetEURO = setTimeout(resetContadorEURO, 1000);
      }
    }

    // ==================== ESTADO DEL JUEGO ====================
    const juego = {
  estado: 'menu',
  score: 0,
  velocidadBase: 4.8,
  velocidad: 4.8,
  tiempo: 0,
  frecuenciaObstaculos: 90,
  contadorObstaculos: 0,
  pantallaRoja: 0,
  record: localStorage.getItem('segarroRecord') ? parseInt(localStorage.getItem('segarroRecord')) : 0,
  choquesSinMorir: 0,
  totalCigarrosReales: 0
};

    recordDisplay.textContent = `RÉCORD: ${juego.record}`;

    // ==================== JUGADOR ====================
    const jugador = {
      carril: CARRILES.CENTRO,
      yVirtual: POS_Y_BASE_VIRTUAL,
      vy: 0,
      anchoVirtual: 35,
      altoVirtual: 65,
      colorPiel: '#6d4c41',
      colorRopa: '#2e7d32',
      colorZapatos: '#212121',
      saltando: false,
      agachado: false,
      enSuelo: true,
      gravedad: 0.6,
      vidas: 1,
      cigarros: 0,
      invulnerable: false,
      tiempoInvulnerable: 0,
      trucoEuro: {
        usado: false
      },
      pakiRicoh: {
        activo: false,
        contador: 0,
        duracion: 300,
        cambiosRestantes: 3,
        proximoCambio: 60,
        direccion: 0,
        humoParticulas: []
      },
      enEscenaFinal: false,
      amigos: []
    };

    // ==================== OBSTÁCULOS ====================
    const obstaculos = [];
    const cigarros = [];
    const cerdos = [];
    const textosEmergentes = [];

    // ==================== FUNCIONES DEL JUEGO ====================
    function activarTrucoEuro() {
      if (jugador.trucoEuro.usado || jugador.pakiRicoh.activo || jugador.enEscenaFinal) return;
      
      jugador.trucoEuro.usado = true;
      juego.estado = 'pausado_truco';
      jugador.vidas++;
      vidasDisplay.textContent = jugador.vidas;
      
      // TEXTO EN CENTRO - COORDENADAS CORREGIDAS
      textosEmergentes.push(new TextoEmergente(
        "EURO", 
        virtualX(400),  // ← CORREGIDO: centro virtual convertido a CSS
        virtualY(300),  // ← CORREGIDO: centro virtual convertido a CSS
        '#ffd700',
        { gigante: true, vibrar: true }
      ));
      
      sonidoEuro();
      
      setTimeout(() => {
        if (juego.estado === 'pausado_truco') juego.estado = 'jugando';
      }, 2000);
    }

    function generarObstaculo() {
      if (juego.contadorObstaculos >= juego.frecuenciaObstaculos) {
        const random = Math.random();
        
        if (random < 0.45) {
          const carril = Math.floor(Math.random() * 3);
          obstaculos.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 28,
            yVirtual: -90,
            anchoVirtual: 56,
            altoVirtual: 75,
            carril: carril,
            tipo: 'policia',
            velocidadExtra: 0,
            colorUniforme: '#2196f3',
            colorGorra: '#1565c0'
          });
        } else if (random < 0.67) {
          const carril = Math.floor(Math.random() * 3);
          obstaculos.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 28,
            yVirtual: -90,
            anchoVirtual: 56,
            altoVirtual: 75,
            carril: carril,
            tipo: 'policia',
            velocidadExtra: 1,
            colorUniforme: '#1565c0',
            colorGorra: '#0a3a75'
          });
        } else if (random < 0.75) {
          const carril = Math.floor(Math.random() * 3);
          cerdos.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 30,
            yVirtual: -70,
            anchoVirtual: 60,
            altoVirtual: 50,
            carril: carril,
            tipo: 'cerdo'
          });
        } else {
          const carril = Math.floor(Math.random() * 3);
          cigarros.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 22,
            yVirtual: -65,
            anchoVirtual: 44,
            altoVirtual: 30,
            carril: carril,
            tipo: 'cigarro',
            tiempoBrasa: 0
          });
        }
        
        juego.contadorObstaculos = 0;
      } else {
        juego.contadorObstaculos++;
      }
    }

    function moverObstaculos() {
      for (let i = obstaculos.length - 1; i >= 0; i--) {
        obstaculos[i].yVirtual += juego.velocidad + obstaculos[i].velocidadExtra;
        if (obstaculos[i].yVirtual > 700) obstaculos.splice(i, 1);
      }
      
      for (let i = cerdos.length - 1; i >= 0; i--) {
        cerdos[i].yVirtual += 1.5;
        if (cerdos[i].yVirtual > 700) cerdos.splice(i, 1);
      }
      
      for (let i = cigarros.length - 1; i >= 0; i--) {
        cigarros[i].yVirtual += juego.velocidad;
        cigarros[i].tiempoBrasa = (cigarros[i].tiempoBrasa + 1) % 20;
        if (cigarros[i].yVirtual > 700) cigarros.splice(i, 1);
      }
    }

    function detectarColisiones() {
      const jugadorXVirtual = POS_X_CARRIL_VIRTUAL[jugador.carril] - jugador.anchoVirtual / 2;
      const jugadorYVirtual = jugador.yVirtual - jugador.altoVirtual / 2;
      
      // Policías
      for (let i = obstaculos.length - 1; i >= 0; i--) {
        const obs = obstaculos[i];
        const obsXVirtual = obs.xVirtual;
        const obsYVirtual = obs.yVirtual - obs.altoVirtual / 2;
        
        if (jugador.pakiRicoh.activo) {
          if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                      obsXVirtual, obsYVirtual, obs.anchoVirtual, obs.altoVirtual)) {
            if (Math.random() < 0.3) {
              // Texto arriba del policía - COORDENADAS CORRECTAS
              textosEmergentes.push(new TextoEmergente(
                "RECISTA", 
                virtualX(POS_X_CARRIL_VIRTUAL[obs.carril]),
                virtualY(obs.yVirtual - 60),
                '#ff4d4d'
              ));
            }
          }
          continue;
        }
        
        if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                    obsXVirtual, obsYVirtual, obs.anchoVirtual, obs.altoVirtual)) {
          if (!jugador.invulnerable) {
            sonidoChoque();
            juego.choquesSinMorir++;
            
            if (juego.choquesSinMorir >= 3) {
              // Texto arriba del policía - COORDENADAS CORRECTAS
              textosEmergentes.push(new TextoEmergente(
                "MI CARTERA¡", 
                virtualX(POS_X_CARRIL_VIRTUAL[obs.carril]),
                virtualY(obs.yVirtual - 70),
                '#ffd166', 
                { gigante: true, vibrar: true }
              ));
              juego.choquesSinMorir = 0;
            }
            
            // Texto arriba del policía - COORDENADAS CORRECTAS
            textosEmergentes.push(new TextoEmergente(
              "RECISTA", 
              virtualX(POS_X_CARRIL_VIRTUAL[obs.carril]),
              virtualY(obs.yVirtual - 60),
              '#ff4d4d'
            ));
            juego.pantallaRoja = 30;
            
            if (jugador.vidas > 1) {
              jugador.vidas--;
              vidasDisplay.textContent = jugador.vidas;
              jugador.invulnerable = true;
              jugador.tiempoInvulnerable = 90;
            } else {
              gameOver();
            }
          }
          obstaculos.splice(i, 1);
        }
      }
      
      // Cerdos
      for (let i = cerdos.length - 1; i >= 0; i--) {
        const cerdo = cerdos[i];
        const cerdoXVirtual = cerdo.xVirtual;
        const cerdoYVirtual = cerdo.yVirtual - cerdo.altoVirtual / 2;
        
        if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                    cerdoXVirtual, cerdoYVirtual, cerdo.anchoVirtual, cerdo.altoVirtual)) {
          if (!jugador.invulnerable) {
            sonidoCerdo();
            jugador.vidas--;
            vidasDisplay.textContent = jugador.vidas;
            
            // Texto arriba del cerdo - COORDENADAS CORRECTAS
            textosEmergentes.push(new TextoEmergente(
              "YALLAH", 
              virtualX(POS_X_CARRIL_VIRTUAL[cerdo.carril]),
              virtualY(cerdo.yVirtual - 65),
              '#ff4d4d', 
              { gigante: true, vibrar: true }
            ));
            juego.pantallaRoja = 35;
            
            if (jugador.vidas <= 0) {
              gameOver();
            } else {
              jugador.invulnerable = true;
              jugador.tiempoInvulnerable = 90;
            }
          }
          cerdos.splice(i, 1);
        }
      }
      
      // Cigarros
      for (let i = cigarros.length - 1; i >= 0; i--) {
        const cig = cigarros[i];
        const cigXVirtual = cig.xVirtual;
        const cigYVirtual = cig.yVirtual - cig.altoVirtual / 2;
        
        if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                    cigXVirtual, cigYVirtual, cig.anchoVirtual, cig.altoVirtual)) {
          sonidoSuspiro();
          
          // Texto arriba del cigarro - COORDENADAS CORRECTAS
          textosEmergentes.push(new TextoEmergente(
            "SEGARRO", 
            virtualX(POS_X_CARRIL_VIRTUAL[cig.carril]),
            virtualY(cig.yVirtual - 55),
            '#ffd166'
          ));
          
          jugador.cigarros++;
          juego.totalCigarrosReales++;
          cigarrosDisplay.textContent = jugador.cigarros;
          
          if (jugador.cigarros >= 5) {
            jugador.vidas++;
            jugador.cigarros = 0;
            cigarrosDisplay.textContent = jugador.cigarros;
            vidasDisplay.textContent = jugador.vidas;
            
            // Texto arriba del jugador - COORDENADAS CORRECTAS
            textosEmergentes.push(new TextoEmergente(
              "AMIGOO", 
              virtualX(POS_X_CARRIL_VIRTUAL[jugador.carril]),
              virtualY(jugador.yVirtual - 60),
              '#ffd700', 
              { gigante: true, vibrar: true }
            ));
          }
          
          if (juego.totalCigarrosReales % 10 === 0 && juego.totalCigarrosReales > 0) {
            activarPakiRicoh();
          }
          
          cigarros.splice(i, 1);
        }
      }
    }

    function colision(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }

    function activarPakiRicoh() {
      jugador.pakiRicoh.activo = true;
      jugador.pakiRicoh.contador = 0;
      jugador.pakiRicoh.cambiosRestantes = 0;  // ← CORREGIDO: 0 cambios (sin movimiento automático)
      jugador.pakiRicoh.proximoCambio = 60;
      jugador.pakiRicoh.direccion = 0;
      jugador.pakiRicoh.duracion = 420;  // ← CORREGIDO: 420 frames = 7 segundos
      jugador.pakiRicoh.humoParticulas = [];
      
      // TEXTO EN CENTRO - COORDENADAS CORREGIDAS
      textosEmergentes.push(new TextoEmergente(
        "¡PAKI RICOH!", 
        virtualX(400),  // ← CORREGIDO: centro virtual convertido a CSS
        virtualY(300),  // ← CORREGIDO: centro virtual convertido a CSS
        '#ffd700', 
        { gigante: true, vibrar: true }
      ));
      
      if (audioContext) {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.type = 'sine';
        osc.frequency.value = 600;
        gain.gain.value = 0.35;
        osc.start();
        osc.stop(audioContext.currentTime + 0.4);
      }
    }

    function actualizarPakiRicoh() {
      if (!jugador.pakiRicoh.activo) return;
      
      jugador.pakiRicoh.contador++;
      
      // Humo (sin cambios)
      if (jugador.pakiRicoh.humoParticulas.length < 50 && Math.random() < 0.4) {
        jugador.pakiRicoh.humoParticulas.push(new ParticulaHumo(
          virtualX(POS_X_CARRIL_VIRTUAL[jugador.carril] + (Math.random() - 0.5) * 25),
          virtualY(jugador.yVirtual - 25)
        ));
      }
      
      for (let i = jugador.pakiRicoh.humoParticulas.length - 1; i >= 0; i--) {
        jugador.pakiRicoh.humoParticulas[i].actualizar();
        if (jugador.pakiRicoh.humoParticulas[i].estaMuerta()) {
          jugador.pakiRicoh.humoParticulas.splice(i, 1);
        }
      }
      
      // ← ELIMINADO: Bloque de cambios automáticos de carril (ya no existe)
      
      // ← ELIMINADO: Movimiento automático de carril (ya no existe)
      
      if (jugador.pakiRicoh.contador >= jugador.pakiRicoh.duracion) {
        terminarPakiRicoh();
      }
    }

    function terminarPakiRicoh() {
      jugador.pakiRicoh.activo = false;
      jugador.pakiRicoh.humoParticulas = [];
      
      // Texto arriba del jugador - COORDENADAS CORRECTAS
      textosEmergentes.push(new TextoEmergente(
        "..", 
        virtualX(POS_X_CARRIL_VIRTUAL[jugador.carril]),
        virtualY(jugador.yVirtual - 50),
        '#ffffff'
      ));
      sonidoTos();
    }

    function actualizarJugador() {
      if (juego.pantallaRoja > 0) juego.pantallaRoja--;
      
      if (!jugador.enSuelo) {
        jugador.vy += jugador.gravedad;
        jugador.yVirtual += jugador.vy;
        if (jugador.yVirtual >= POS_Y_BASE_VIRTUAL) {
          jugador.yVirtual = POS_Y_BASE_VIRTUAL;
          jugador.vy = 0;
          jugador.enSuelo = true;
          jugador.saltando = false;
        }
      }
      
      if (jugador.invulnerable) {
        jugador.tiempoInvulnerable--;
        if (jugador.tiempoInvulnerable <= 0) jugador.invulnerable = false;
      }
      
      if (jugador.agachado && !jugador.enSuelo) {
        jugador.agachado = false;
        jugador.altoVirtual = 65;
      }
      
      actualizarPakiRicoh();
    }

    function actualizarDificultad() {
      juego.score++;
      scoreDisplay.textContent = `SCORE: ${juego.score}`;
      
      juego.velocidad = 4.8;
      if (juego.score >= 1000) juego.velocidad += 0.6;
      if (juego.score >= 2000) juego.velocidad += 0.6;
      if (juego.score >= 3500) juego.velocidad += 0.6;
      if (juego.score >= 5500) juego.velocidad += 0.6;
      if (juego.score >= 8000) juego.velocidad += 0.6;
      if (juego.score >= 11000) juego.velocidad += 0.6;
      if (juego.score >= 15000) juego.velocidad += 0.6;
      
      if (juego.score >= 30000 && juego.estado !== 'final') {
        escenaFinal();
        return;
      }
      
      if (juego.score % 1200 === 0 && juego.frecuenciaObstaculos > 40) {
        juego.frecuenciaObstaculos -= 6;
      }
    }

    function actualizarTextos() {
      for (let i = textosEmergentes.length - 1; i >= 0; i--) {
        textosEmergentes[i].actualizar();
        if (textosEmergentes[i].estaMuerto()) textosEmergentes.splice(i, 1);
      }
    }

    function escenaFinal() {
      juego.estado = 'final';
      jugador.enEscenaFinal = true;
      stopMusicaArabe();
      
      if (audioContext) {
        const notas = [110, 130.81, 146.83];
        let indice = 0;
        function tocar() {
          if (!audioContext) return;
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.connect(gain);
          gain.connect(audioContext.destination);
          osc.type = 'sine';
          osc.frequency.value = notas[indice];
          gain.gain.value = 0.08;
          osc.start();
          osc.stop(audioContext.currentTime + 1.2);
          gain.gain.setValueAtTime(0.08, audioContext.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.2);
          indice = (indice + 1) % notas.length;
          setTimeout(tocar, 1800);
        }
        tocar();
      }
      
      jugador.amigos = [];
      const posiciones = [
        { x: 300, y: 410, colorPiel: '#795548', colorRopa: '#d32f2f' },
        { x: 360, y: 425, colorPiel: '#5d4037', colorRopa: '#1976d2' },
        { x: 440, y: 425, colorPiel: '#8d6e63', colorRopa: '#388e3c' },
        { x: 500, y: 410, colorPiel: '#6d4c41', colorRopa: '#f57c00' },
        { x: 400, y: 450, colorPiel: '#5d4037', colorRopa: '#7b1fa2' }
      ];
      
      posiciones.forEach(pos => {
        jugador.amigos.push({
          xVirtual: pos.x,
          yVirtual: pos.y,
          colorPiel: pos.colorPiel,
          colorRopa: pos.colorRopa
        });
      });
    }

    function gameOver() {
      juego.estado = 'gameover';
      
      if (juego.score > juego.record) {
        juego.record = juego.score;
        localStorage.setItem('segarroRecord', juego.record.toString());
        recordDisplay.textContent = `RÉCORD: ${juego.record}`;
      }
      
      finalScoreDisplay.textContent = `SCORE: ${juego.score}`;
      bestRecordDisplay.textContent = `MEJOR RÉCORD: ${juego.record}`;
      gameOverPanel.style.display = 'block';
      
      if (audioContext) {
        const osc1 = audioContext.createOscillator();
        const osc2 = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioContext.destination);
        osc1.frequency.value = 650;
        osc2.frequency.value = 850;
        gain.gain.value = 0.2;
        osc1.start();
        osc2.start();
        
        let asc = true;
        const int = setInterval(() => {
          if (!audioContext) { clearInterval(int); return; }
          osc1.frequency.value = asc ? 850 : 650;
          osc2.frequency.value = asc ? 1050 : 850;
          asc = !asc;
        }, 300);
        
        setTimeout(() => {
          clearInterval(int);
          osc1.stop();
          osc2.stop();
        }, 2500);
      }
      
      stopMusicaArabe();
    }

    function reiniciarJuego() {
      juego.estado = 'jugando';
      juego.score = 0;
      juego.velocidad = juego.velocidadBase;
      juego.frecuenciaObstaculos = 90;

    // ==================== RENDERIZADO ====================
    function dibujarFondo() {
      ctx.save();
      ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));

      // Cielo estrellado nocturno con gradiente profundo
      const skyGrad = ctx.createRadialGradient(400, 100, 0, 400, 100, 500);
      skyGrad.addColorStop(0, '#0a0a14');
      skyGrad.addColorStop(0.3, '#1a1a2e');
      skyGrad.addColorStop(0.7, '#0f3460');
      skyGrad.addColorStop(1, '#000011');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, 800, 600);

      // Estrellas parpadeantes
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      for (let i = 0; i < 20; i++) {
        const blink = 0.5 + Math.sin(juego.tiempo * 0.05 + i) * 0.5;
        ctx.globalAlpha = blink * 0.6;
        ctx.beginPath();
        ctx.arc(50 + i * 35 + Math.sin(juego.tiempo * 0.03 + i) * 5, 50 + i * 10, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Edificios con ventanas iluminadas (profundidad)
      ctx.fillStyle = '#111122';
      ctx.fillRect(0, 250, 800, 350); // Base oscura
      // Edificio 1
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(40, 200, 140, 280);
      for (let j = 0; j < 8; j++) {
        for (let k = 0; k < 4; k++) {
          const light = Math.sin(juego.tiempo * 0.08 + j + k) > 0 ? '#ffff88' : '#112244';
          ctx.fillStyle = light;
          ctx.fillRect(50 + k * 30, 220 + j * 30, 20, 20);
        }
      }
      // Edificio 2, 3... (repite patrón para más)
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(220, 230, 100, 260);
      ctx.fillRect(350, 210, 160, 300);
      ctx.fillRect(550, 220, 120, 280);
      ctx.fillRect(680, 190, 110, 320);

      // Neones parpadeantes en edificios
      const neonPhase = juego.tiempo * 0.15;
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 20;
      ctx.fillStyle = `rgba(255, 0, 255, ${0.4 + Math.sin(neonPhase) * 0.3})`;
      ctx.fillRect(360, 215, 140, 8);
      ctx.shadowColor = '#00ffff';
      ctx.fillStyle = `rgba(0, 255, 255, ${0.4 + Math.cos(neonPhase * 1.2) * 0.3})`;
      ctx.fillRect(60, 205, 100, 6);
      ctx.shadowBlur = 0;

      // Carretera asfalto con textura y líneas
      const roadGrad = ctx.createLinearGradient(0, 350, 0, 600);
      roadGrad.addColorStop(0, '#2a2a3a');
      roadGrad.addColorStop(1, '#1a1a25');
      ctx.fillStyle = roadGrad;
      ctx.fillRect(0, 350, 800, 250);

      // Textura asfalto (puntos aleatorios)
      ctx.fillStyle = 'rgba(50, 50, 60, 0.4)';
      for (let i = 0; i < 500; i++) {
        ctx.beginPath();
        ctx.arc(Math.random() * 800, 350 + Math.random() * 250, Math.random() * 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Líneas de carril animadas (scroll infinito)
      ctx.strokeStyle = '#ffff88';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.setLineDash([30, 30]);
      for (let i = 0; i < 5; i++) {
        const y = (juego.tiempo * juego.velocidad * 0.5 + i * 100) % 250 + 350;
        ctx.beginPath();
        ctx.moveTo(200, y);
        ctx.lineTo(600, y);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      // Bordes de carril
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(200, 350);
      ctx.lineTo(200, 600);
      ctx.moveTo(600, 350);
      ctx.lineTo(600, 600);
      ctx.stroke();

      // Farolas lejanas (luces amarillas)
      for (let i = 0; i < 6; i++) {
        const x = 100 + i * 130;
        const flicker = 0.8 + Math.sin(juego.tiempo * 0.1 + i) * 0.2;
        ctx.shadowColor = '#ffaa00';
        ctx.shadowBlur = 15;
        ctx.fillStyle = `rgba(255, 170, 0, ${flicker})`;
        ctx.beginPath();
        ctx.arc(x, 380 + Math.sin(juego.tiempo * 0.05) * 5, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x, 380);
        ctx.lineTo(x, 450);
        ctx.stroke();
      }

      // Coches lejanos (sombras moviéndose)
      ctx.fillStyle = 'rgba(100, 100, 120, 0.6)';
      for (let i = 0; i < 3; i++) {
        const x = (juego.tiempo * 2 + i * 300) % 800;
        ctx.beginPath();
        ctx.ellipse(x, 410, 40, 15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 255, 200, 0.4)';
        ctx.beginPath();
        ctx.arc(x - 15, 405, 4, 0, Math.PI * 2);
        ctx.arc(x + 15, 405, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

  ctx.beginPath();
  ctx.arc(x + jugador.anchoVirtual / 2 - 5, yBase - jugador.altoVirtual - 14, 2.5, 0, Math.PI * 2);
  ctx.arc(x + jugador.anchoVirtual / 2 + 5, yBase - jugador.altoVirtual - 14, 2.5, 0, Math.PI * 2);
  ctx.fill();
  
  // Boca sonrisa torcida
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x + jugador.anchoVirtual / 2 - 8, yBase - jugador.altoVirtual + 5);
  ctx.quadraticCurveTo(x + jugador.anchoVirtual / 2, yBase - jugador.altoVirtual + 10, x + jugador.anchoVirtual / 2 + 8, yBase - jugador.altoVirtual + 3);
  ctx.stroke();
  
  // Ropa y bolsillo con cigarro
  ctx.fillStyle = jugador.colorRopa;
  ctx.roundRect(x + 5, yBase - jugador.altoVirtual + 10, jugador.anchoVirtual - 10, 50, 8);
  ctx.fill();
  
  ctx.fillStyle = '#8d6e63';
  ctx.beginPath();
  ctx.arc(x + 12, yBase - jugador.altoVirtual + 20, 5, 0, Math.PI * 2); // bolsillo
  ctx.fill();
  ctx.fillStyle = '#a0522d';
  ctx.fillRect(x + 10, yBase - jugador.altoVirtual + 15, 4, 10); // cigarro asomando
  
  // Brazos balanceo natural (como corriendo)
  const brazoOffset = Math.sin(juego.tiempo * 0.25) * 12;
  ctx.fillStyle = jugador.colorPiel;
  ctx.roundRect(x - 5, yBase - jugador.altoVirtual + 15 + brazoOffset, 10, 35, 4);
  ctx.roundRect(x + jugador.anchoVirtual - 5, yBase - jugador.altoVirtual + 15 - brazoOffset, 10, 35, 4);
  
  // Piernas alternas
  const piernaOffset = Math.sin(juego.tiempo * 0.3) * 8;
  ctx.fillStyle = '#1a237e';
  ctx.roundRect(x + 10, yBase - 10 + piernaOffset, 10, 35, 4);
  ctx.roundRect(x + jugador.anchoVirtual - 20, yBase - 10 - piernaOffset, 10, 35, 4);
  
  ctx.fillStyle = jugador.colorZapatos;
  ctx.fillRect(x + 8, yBase + 20, 14, 10);
  ctx.fillRect(x + jugador.anchoVirtual - 22, yBase + 20, 14, 10);
  
  // Humo sutil de boca (solo si no estás en Paki Ricoh)
  if (!jugador.pakiRicoh.activo && Math.random() < 0.2) {
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = 'rgba(220,220,220,0.8)';
    ctx.beginPath();
    ctx.arc(x + jugador.anchoVirtual / 2 + Math.random() * 4 - 2, yBase - jugador.altoVirtual - 5 - Math.random() * 10, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  
  ctx.restore();
}

function dibujarPolicia(obs) {
  ctx.save();
  ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));
  const x = obs.xVirtual;
  const y = obs.yVirtual;
  const t = juego.tiempo * 0.1; // ritmo lento y natural
  
  // Sombra suave
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.ellipse(x + 28, y + 25, 32, 12, 0, 0, Math.PI * 2);
  
  // Piernas: caminata tranquila
  const pierna1 = Math.sin(t * 2) * 5;
  const pierna2 = Math.sin(t * 2 + Math.PI) * 5;
  ctx.fillStyle = '#1e3a5f';
  ctx.roundRect(x + 15, y + 10 + pierna1, 10, 30, 4);
  ctx.roundRect(x + 35, y + 10 + pierna2, 10, 30, 4);
  
  // Torso recto
  ctx.fillStyle = obs.colorUniforme;
  ctx.roundRect(x + 10, y - 45, 36, 60, 8);
  ctx.fill();
  
  // Brazos balanceo (manos en bolsillo casi)
  const brazo1 = Math.sin(t * 1.5) * 8;
  const brazo2 = Math.sin(t * 1.5 + Math.PI) * 8;
  ctx.fillStyle = obs.colorUniforme;
  ctx.roundRect(x + 5, y - 30 + brazo1, 10, 35, 4);
  ctx.roundRect(x + 45, y - 30 + brazo2, 10, 35, 4);
  
  // Cabeza fija mirando adelante
  ctx.fillStyle = '#f0f0f0';
  ctx.arc(x + 28, y - 65, 18, 0, Math.PI * 2);
  ctx.fill();
  
  // Gorra recta
  ctx.fillStyle = obs.colorGorra;
  ctx.roundRect(x + 15, y - 80, 26, 15, 4);
  ctx.fill();
  
  // Cara neutra: ojos normales, boca recta
  ctx.fillStyle = '#000';
  ctx.arc(x + 22, y - 62, 3, 0, Math.PI * 2);
  ctx.arc(x + 34, y - 62, 3, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + 22, y - 55);
  ctx.lineTo(x + 34, y - 55);
  ctx.stroke();
  
  ctx.restore();
}

function dibujarCerdo(cerdo) {
  ctx.save();
  ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));
  const x = cerdo.xVirtual;
  const y = cerdo.yVirtual;
  const t = juego.tiempo * 0.15;
  
  // Rebote alegre
  const rebote = Math.sin(t * 3) * 4;
  const yBase = y + rebote;
  
  // Cuerpo rosa redondo
  ctx.fillStyle = '#ffb3ba';
  ctx.arc(x + 30, yBase - 25, 30, 0, Math.PI * 2);
  ctx.fill();
  
  // Orejas triangulares subiendo/bajando
  ctx.fillStyle = '#ff8fab';
  const orejaOff = Math.sin(t * 2) * 3;
  ctx.beginPath();
  ctx.moveTo(x + 10, yBase - 40);
  ctx.lineTo(x + 5, yBase - 55 + orejaOff);
  ctx.lineTo(x + 15, yBase - 50 + orejaOff);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 50, yBase - 40);
  ctx.lineTo(x + 55, yBase - 55 - orejaOff);
  ctx.lineTo(x + 45, yBase - 50 - orejaOff);
  ctx.fill();
  
  // Naricita
  ctx.fillStyle = '#ff8fab';
  ctx.arc(x + 30, yBase - 30, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.arc(x + 27, yBase - 30, 2, 0, Math.PI * 2);
  ctx.arc(x + 33, yBase - 30, 2, 0, Math.PI * 2);
  ctx.fill();
  
  // Ojos grandes de sorpresa
  ctx.fillStyle = 'white';
  ctx.arc(x + 20, yBase - 35, 8, 0, Math.PI * 2);
  ctx.arc(x + 40, yBase - 35, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.arc(x + 20, yBase - 35, 4, 0, Math.PI * 2);
  ctx.arc(x + 40, yBase - 35, 4, 0, Math.PI * 2);
  ctx.fill();
  
  // Boca "O"
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x + 30, yBase - 20, 8, 0, Math.PI * 2);
  ctx.stroke();
  
  // Colita rizada girando
  ctx.strokeStyle = '#ff8fab';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x + 55, yBase - 15);
  ctx.lineTo(x + 60 + Math.sin(t * 5) * 2, yBase - 25);
  ctx.lineTo(x + 55 + Math.sin(t * 5 + Math.PI) * 2, yBase - 35);
  ctx.stroke();
  
  ctx.restore();
}

function dibujarCigarro(cig) {
  ctx.save();
  ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));
  const x = cig.xVirtual;
  const y = cig.yVirtual;
  const pulse = 0.9 + Math.sin(cig.tiempoBrasa * 0.4) * 0.1;
  
  // Filtro marrón corto
  ctx.fillStyle = '#a0522d';
  ctx.roundRect(x + 10, y - 15, 10, 15, 4);
  ctx.fill();
  
  // Papel blanco delgado
  ctx.fillStyle = '#f8f8f8';
  ctx.roundRect(x + 20, y - 40, 8, 25, 3);
  ctx.fill();
  
  // Brasa roja fuerte
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 12 * pulse;
  ctx.fillStyle = '#ff0000';
  ctx.arc(x + 24, y - 40, 5 * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Humo corto y fino (solo 4 volutas)
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = 'rgba(240,240,240,0.8)';
  for (let i = 0; i < 4; i++) {
    const r = 3 + i * 1.2;
    const smokeY = y - 45 - i * 6 - Math.sin(cig.tiempoBrasa * 0.15 + i) * 2;
    ctx.arc(x + 24 + Math.sin(cig.tiempoBrasa + i) * 2, smokeY, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  ctx.restore();
}

    function dibujarObstaculos() {
      obstaculos.forEach(obs => dibujarPolicia(obs));
      cerdos.forEach(cerdo => dibujarCerdo(cerdo));
      cigarros.forEach(cig => dibujarCigarro(cig));
    }

    function dibujarParticulasPakiRicoh() {
      if (jugador.pakiRicoh.activo) {
        ctx.save();
        ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));
        jugador.pakiRicoh.humoParticulas.forEach(p => p.dibujar(ctx));
        ctx.restore();
      }
    }

    // ==================== ¡¡¡FUNCIÓN CLAVE!!! ====================
    // DIBUJAR TEXTOS SIN ESCALADO ADICIONAL
    function dibujarTextos() {
      textosEmergentes.forEach(t => t.dibujar(ctx));
    }

    function dibujarEfectoPantallaRoja() {
      if (juego.pantallaRoja > 0) {
        ctx.fillStyle = `rgba(255, 50, 50, ${juego.pantallaRoja / 50})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function actualizarIndicadorCarril() {
      if (jugador.enEscenaFinal) return;
      
      const posicionesX = [
        virtualX(170),
        virtualX(370),
        virtualX(570)
      ];
      carrilIndicator.style.left = `${posicionesX[jugador.carril]}px`;
      
      if (jugador.carrilCambiado) {
        carrilIndicator.style.width = '7vw';
        setTimeout(() => {
          carrilIndicator.style.width = '5vw';
        }, 200);
        jugador.carrilCambiado = false;
      }
    }

    // ==================== BUCLE PRINCIPAL ====================
    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (juego.estado === 'jugando' || juego.estado === 'pausado_truco') {
        actualizarJugador();
        
        if (juego.estado === 'jugando' && !jugador.enEscenaFinal) {
          generarObstaculo();
          moverObstaculos();
          detectarColisiones();
          actualizarDificultad();
        }
        
        actualizarTextos();
        actualizarIndicadorCarril();
        
        juego.tiempo++;
      }
      
      if (juego.estado !== 'gameover') {
        dibujarFondo();
        if (!jugador.enEscenaFinal) {
          dibujarObstaculos();
          dibujarParticulasPakiRicoh();
        }
        dibujarJugador();
        dibujarTextos();              // ← Textos ANTES del efecto rojo
        dibujarEfectoPantallaRoja();  // ← Efecto rojo DESPUÉS
      }
      
      requestAnimationFrame(gameLoop);
    }

    // ==================== INICIAR ====================
    startBtn.addEventListener('click', () => {
      titleScreen.style.display = 'none';
      juego.estado = 'jugando';
      initAudio();
    });
    
    restartBtn.addEventListener('click', reiniciarJuego);
    
    titleScreen.addEventListener('touchmove', (e) => {}, { passive: true });
    
    gameLoop();
  </script>
</body>
</html>
