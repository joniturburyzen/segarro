<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EL SEGARRO RUNNER - ENHANCED</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a14;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      color: white;
      width: 100vw;
      height: 100vh;
      position: fixed;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #0a0a14;
    }

    #hud {
      position: absolute;
      top: 2%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4vw;
      background: rgba(0, 0, 0, 0.85);
      padding: 1.8vh 3.5vw;
      border-radius: 3vh;
      border: 2px solid #ffd166;
      box-shadow: 0 0 15px rgba(255, 209, 102, 0.7), 0 0 30px rgba(255, 209, 102, 0.3);
      font-size: 2.8vh;
      font-weight: bold;
      z-index: 10;
      white-space: nowrap;
      backdrop-filter: blur(10px);
      animation: hudPulse 3s ease-in-out infinite;
    }

    @keyframes hudPulse {
      0%, 100% { box-shadow: 0 0 15px rgba(255, 209, 102, 0.7), 0 0 30px rgba(255, 209, 102, 0.3); }
      50% { box-shadow: 0 0 25px rgba(255, 209, 102, 0.9), 0 0 50px rgba(255, 209, 102, 0.5); }
    }

    #score-display, #record-display {
      position: absolute;
      top: 2%;
      font-size: 3.2vh;
      font-weight: bold;
      color: #ffd166;
      text-shadow: 0 0 8px rgba(255, 209, 102, 0.9), 0 0 15px rgba(255, 77, 77, 0.5);
      font-family: 'Courier New', monospace;
      z-index: 10;
      text-align: center;
      width: 30%;
      transition: transform 0.1s ease-out, text-shadow 0.2s;
    }

    #score-display { right: 3%; }
    #record-display { left: 3%; }

    #score-display.bump {
      transform: scale(1.3);
      text-shadow: 0 0 15px rgba(255, 209, 102, 1), 0 0 30px rgba(255, 77, 77, 0.8);
    }

    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: rgba(0, 0, 0, 0.95);
      color: #ff4d4d;
      padding: 4vh 6vw;
      border-radius: 4vh;
      border: 4px solid #ff4d4d;
      text-align: center;
      z-index: 20;
      box-shadow: 
        0 0 30px rgba(255, 77, 77, 0.9),
        0 0 50px rgba(255, 209, 102, 0.5),
        inset 0 0 50px rgba(255, 77, 77, 0.1);
      width: 85%;
      max-width: 75vw;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #game-over.show {
      transform: translate(-50%, -50%) scale(1);
    }

    #game-over h2 {
      font-size: 5vh;
      margin-bottom: 4vh;
      text-shadow: 0 0 15px rgba(255, 77, 77, 0.95);
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #ff4d4d, #ffd166, #ff4d4d);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 2s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    #game-over p {
      font-size: 3.5vh;
      margin-bottom: 6vh;
      color: #ffd166;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 10px rgba(255, 209, 102, 0.8);
    }

    #restart-btn {
      background: linear-gradient(45deg, #06d6a0, #118ab2, #06d6a0);
      background-size: 200% 200%;
      color: white;
      border: none;
      padding: 3vh 10vw;
      font-size: 4.5vh;
      border-radius: 3vh;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
      box-shadow: 0 4px 20px rgba(6, 214, 160, 0.6);
      width: 90%;
      margin: 0 auto;
      display: block;
      animation: gradientShift 3s ease infinite;
    }

    #restart-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 35px rgba(6, 214, 160, 0.9);
    }

    #restart-btn:active {
      transform: scale(0.98);
    }

    #instructions {
      position: absolute;
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%);
      color: #a8dadc;
      font-size: 2.4vh;
      text-align: center;
      width: 95%;
      font-family: 'Courier New', monospace;
      background: rgba(0, 0, 0, 0.7);
      padding: 1.5vh 3vw;
      border-radius: 2.5vh;
      z-index: 10;
      text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(168, 218, 220, 0.3);
    }

    #title-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f0c29, #1a1a2e, #0f0c29);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
      gap: 6vh;
      touch-action: auto;
      overflow: hidden;
    }

    #title-screen::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 209, 102, 0.1) 0%, transparent 50%);
      animation: bgPulse 4s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0%, 100% { transform: translate(-25%, -25%) scale(1); opacity: 0.5; }
      50% { transform: translate(-25%, -25%) scale(1.2); opacity: 1; }
    }

    #title-screen h1 {
      font-size: 9vh;
      font-weight: bold;
      color: #ffd166;
      text-shadow: 
        0 0 15px rgba(255, 209, 102, 0.9),
        0 0 30px rgba(255, 77, 77, 0.7),
        0 0 45px rgba(255, 209, 102, 0.5);
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
      animation: pulseTitle 2s infinite;
      text-align: center;
      padding: 0 5vw;
      background: linear-gradient(45deg, #ffd166, #ff4d4d, #ffd166, #ff4d4d);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulseTitle 2s infinite, gradientTitle 4s ease infinite;
      z-index: 1;
    }

    @keyframes pulseTitle {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255, 209, 102, 0.9)); }
      50% { transform: scale(1.07); filter: drop-shadow(0 0 30px rgba(255, 77, 77, 0.9)); }
    }

    @keyframes gradientTitle {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    #start-btn {
      background: linear-gradient(45deg, #ff4d4d, #ffd166, #ff4d4d);
      background-size: 200% 200%;
      color: white;
      border: none;
      padding: 4vh 12vw;
      font-size: 6vh;
      border-radius: 4vh;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
      box-shadow: 
        0 0 25px rgba(255, 77, 77, 0.8),
        0 0 50px rgba(255, 209, 102, 0.6);
      letter-spacing: 2px;
      animation: gradientShift 3s ease infinite;
      z-index: 1;
      position: relative;
      overflow: hidden;
    }

    #start-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: rotate(45deg);
      animation: btnShine 3s ease-in-out infinite;
    }

    @keyframes btnShine {
      0% { transform: translateX(-100%) rotate(45deg); }
      50%, 100% { transform: translateX(100%) rotate(45deg); }
    }

    #start-btn:hover {
      transform: scale(1.1);
      box-shadow: 
        0 0 35px rgba(255, 77, 77, 0.95),
        0 0 70px rgba(255, 209, 102, 0.8);
    }

    #start-btn:active {
      transform: scale(0.98);
    }

    #carril-indicator {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 5vw;
      height: 1.2vh;
      background: linear-gradient(90deg, #4cc9f0, #4361ee, #3a0ca3);
      border-radius: 1vh;
      box-shadow: 0 0 15px rgba(76, 201, 240, 0.9), 0 0 30px rgba(67, 97, 238, 0.5);
      transition: left 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), width 0.2s, box-shadow 0.2s;
      z-index: 5;
    }

    #carril-indicator.active {
      width: 7vw;
      box-shadow: 0 0 25px rgba(76, 201, 240, 1), 0 0 50px rgba(67, 97, 238, 0.8);
    }

    #audio-message {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%) scale(0);
      background: linear-gradient(90deg, #ffd166, #ff9e6d, #ffd166);
      background-size: 200% 200%;
      color: #0a0a14;
      padding: 2vh 5vw;
      border-radius: 3vh;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 3vh;
      z-index: 15;
      box-shadow: 0 0 20px rgba(255, 209, 102, 0.9);
      animation: gradientShift 2s ease infinite;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #audio-message.show {
      transform: translateX(-50%) scale(1);
    }

    /* Screen shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .shake {
      animation: shake 0.4s ease-in-out;
    }

    /* Combo indicator */
    #combo-display {
      position: absolute;
      top: 15%;
      right: 5%;
      font-size: 4vh;
      font-weight: bold;
      color: #ff4d4d;
      text-shadow: 0 0 15px rgba(255, 77, 77, 0.9);
      font-family: 'Courier New', monospace;
      z-index: 10;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #combo-display.show {
      opacity: 1;
      transform: scale(1);
    }

    /* Speed indicator */
    #speed-indicator {
      position: absolute;
      bottom: 15%;
      left: 3%;
      width: 8vw;
      height: 1vh;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 1vh;
      overflow: hidden;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    #speed-bar {
      height: 100%;
      background: linear-gradient(90deg, #06d6a0, #ffd166, #ff4d4d);
      border-radius: 1vh;
      transition: width 0.5s ease-out;
      box-shadow: 0 0 10px currentColor;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div>
        <span>❤️</span> <span id="vidas-count">1</span>
      </div>
      <div>
        <span>🚬</span> <span id="cigarros-count">0</span>/5
      </div>
    </div>
    <div id="score-display">SCORE: 0</div>
    <div id="record-display">RÉCORD: 0</div>
    <div id="combo-display">x0</div>
    <div id="speed-indicator"><div id="speed-bar" style="width: 20%"></div></div>
    <canvas id="game-canvas"></canvas>
    
    <div id="carril-indicator"></div>
    
    <div id="game-over">
      <h2>¡RECISTA!</h2>
      <p id="final-score">SCORE: 0</p>
      <p id="best-record">MEJOR RÉCORD: 0</p>
      <button id="restart-btn">OTRA VEZ, AMIGOO</button>
    </div>
    
    <div id="instructions">
      <p>← → : Carriles | ↑ : Saltar | ↓ : Agacharse | 3↓ rápidos: EURO</p>
    </div>

    <div id="title-screen">
      <h1>EL SEGARRO RUNNER</h1>
      <button id="start-btn">EMPEZAR A FUMAR</button>
    </div>

    <div id="audio-message">🔊 ¡MUSIQUILLA ÁRABE ACTIVADA!</div>
  </div>

  <script>
    // ==================== CONFIGURACIÓN DE ALTA RESOLUCIÓN ====================
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    
    const dpr = window.devicePixelRatio || 1;
    
    function resizeCanvas() {
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.scale(dpr, dpr);
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function virtualX(x) { return (x / 800) * canvas.clientWidth; }
    function virtualY(y) { return (y / 600) * canvas.clientHeight; }
    function virtualW(w) { return (w / 800) * canvas.clientWidth; }
    function virtualH(h) { return (h / 600) * canvas.clientHeight; }

    // ==================== ELEMENTOS DEL DOM ====================
    const scoreDisplay = document.getElementById('score-display');
    const recordDisplay = document.getElementById('record-display');
    const vidasDisplay = document.getElementById('vidas-count');
    const cigarrosDisplay = document.getElementById('cigarros-count');
    const gameOverPanel = document.getElementById('game-over');
    const finalScoreDisplay = document.getElementById('final-score');
    const bestRecordDisplay = document.getElementById('best-record');
    const restartBtn = document.getElementById('restart-btn');
    const titleScreen = document.getElementById('title-screen');
    const startBtn = document.getElementById('start-btn');
    const audioMessage = document.getElementById('audio-message');
    const carrilIndicator = document.getElementById('carril-indicator');
    const instructions = document.getElementById('instructions');
    const gameContainer = document.getElementById('game-container');
    const comboDisplay = document.getElementById('combo-display');
    const speedBar = document.getElementById('speed-bar');

    const esMovil = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                    ('ontouchstart' in window || navigator.maxTouchPoints > 0);

    // ==================== CONSTANTES DEL JUEGO ====================
    const CARRILES = { IZQUIERDA: 0, CENTRO: 1, DERECHA: 2 };
    const POS_X_CARRIL_VIRTUAL = [200, 400, 600];
    const POS_Y_BASE_VIRTUAL = 350;
    const umbralSwipe = 20;
    const umbralSwipeEURO = 40;
    const tiempoMaximoSwipe = 400;

    // ==================== SISTEMA DE PARTÍCULAS MEJORADO ====================
    class Particula {
      constructor(x, y, opciones = {}) {
        this.x = x;
        this.y = y;
        this.vx = opciones.vx || (Math.random() - 0.5) * 4;
        this.vy = opciones.vy || (Math.random() - 0.5) * 4 - 2;
        this.radio = opciones.radio || 3 + Math.random() * 5;
        this.radioInicial = this.radio;
        this.color = opciones.color || '#ffd166';
        this.vida = opciones.vida || 60;
        this.vidaMax = this.vida;
        this.gravedad = opciones.gravedad || 0.1;
        this.friccion = opciones.friccion || 0.98;
        this.tipo = opciones.tipo || 'circulo';
        this.rotacion = Math.random() * Math.PI * 2;
        this.rotacionVel = (Math.random() - 0.5) * 0.2;
      }
      
      actualizar() {
        this.vy += this.gravedad;
        this.vx *= this.friccion;
        this.vy *= this.friccion;
        this.x += this.vx;
        this.y += this.vy;
        this.vida--;
        this.radio = this.radioInicial * (this.vida / this.vidaMax);
        this.rotacion += this.rotacionVel;
      }
      
      dibujar(ctx) {
        const alpha = this.vida / this.vidaMax;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotacion);
        
        if (this.tipo === 'estrella') {
          this.dibujarEstrella(ctx);
        } else if (this.tipo === 'humo') {
          this.dibujarHumo(ctx);
        } else {
          ctx.fillStyle = this.color;
          ctx.shadowColor = this.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(0, 0, this.radio, 0, Math.PI * 2);
          ctx.fill();
        }
        
        ctx.restore();
      }
      
      dibujarEstrella(ctx) {
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
          const x = Math.cos(angle) * this.radio;
          const y = Math.sin(angle) * this.radio;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
      }
      
      dibujarHumo(ctx) {
        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radio);
        gradient.addColorStop(0, `rgba(200, 200, 200, 0.8)`);
        gradient.addColorStop(1, `rgba(150, 150, 150, 0)`);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, this.radio, 0, Math.PI * 2);
        ctx.fill();
      }
      
      estaMuerta() { return this.vida <= 0 || this.radio < 0.5; }
    }

    // Sistema de partículas global
    const particulas = [];

    function crearExplosion(x, y, color, cantidad = 15) {
      for (let i = 0; i < cantidad; i++) {
        particulas.push(new Particula(x, y, {
          color: color,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8 - 3,
          radio: 2 + Math.random() * 6,
          vida: 40 + Math.random() * 30,
          tipo: Math.random() > 0.5 ? 'estrella' : 'circulo'
        }));
      }
    }

    function crearTrail(x, y, color) {
      particulas.push(new Particula(x, y, {
        color: color,
        vx: (Math.random() - 0.5) * 1,
        vy: 0.5,
        radio: 2 + Math.random() * 3,
        vida: 20,
        gravedad: 0,
        tipo: 'circulo'
      }));
    }

    function crearHumo(x, y) {
      particulas.push(new Particula(x, y, {
        vx: (Math.random() - 0.5) * 0.5,
        vy: -1 - Math.random() * 0.5,
        radio: 4 + Math.random() * 6,
        vida: 50 + Math.random() * 30,
        gravedad: -0.02,
        friccion: 0.99,
        tipo: 'humo'
      }));
    }

    // ==================== CLASE TEXTO EMERGENTE MEJORADA ====================
    class TextoEmergente {
      constructor(texto, x, y, color = '#ffd166', opciones = {}) {
        this.texto = texto;
        this.x = x;
        this.y = y;
        this.color = color;
        this.vida = opciones.gigante ? 100 : 70;
        this.vidaMax = this.vida;
        this.velocidadY = -2;
        this.escala = opciones.gigante ? 2.2 : 1.2;
        this.escalaBase = this.escala;
        this.vibrar = opciones.vibrar || false;
        this.tiempo = 0;
        this.rebote = opciones.rebote || false;
      }
      
      actualizar() {
        this.y += this.velocidadY;
        this.vida--;
        this.tiempo++;
        
        if (this.rebote && this.tiempo < 15) {
          this.escala = this.escalaBase * (1 + Math.sin(this.tiempo * 0.5) * 0.3);
        }
      }
      
      dibujar(ctx) {
        ctx.save();
        const alpha = Math.min(1, this.vida / (this.vidaMax * 0.3));
        ctx.globalAlpha = alpha;

        let offsetX = this.x;
        if (this.vibrar) {
          offsetX += Math.sin(this.tiempo * 0.5) * 3;
        }
        
        ctx.font = `bold ${Math.floor(28 * this.escala)}px 'Courier New', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // Sombra/glow
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 20;
        
        // Borde
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.lineWidth = 5 * this.escala;
        ctx.lineJoin = 'round';
        ctx.strokeText(this.texto, offsetX, this.y);
        
        // Texto con gradiente
        const gradient = ctx.createLinearGradient(offsetX - 50, this.y - 20, offsetX + 50, this.y + 20);
        gradient.addColorStop(0, this.color);
        gradient.addColorStop(0.5, '#ffffff');
        gradient.addColorStop(1, this.color);
        ctx.fillStyle = gradient;
        ctx.fillText(this.texto, offsetX, this.y);
        
        ctx.restore();
      }
      
      estaMuerto() { return this.vida <= 0; }
    }

    const textosEmergentes = [];

    // ==================== SCREEN SHAKE ====================
    let shakeIntensity = 0;
    let shakeDecay = 0.9;

    function screenShake(intensity) {
      shakeIntensity = Math.max(shakeIntensity, intensity);
    }

    function aplicarShake() {
      if (shakeIntensity > 0.5) {
        const offsetX = (Math.random() - 0.5) * shakeIntensity * 2;
        const offsetY = (Math.random() - 0.5) * shakeIntensity * 2;
        ctx.translate(offsetX, offsetY);
        shakeIntensity *= shakeDecay;
      } else {
        shakeIntensity = 0;
      }
    }

    // ==================== AUDIO ====================
    let audioContext;
    let audioHabilitado = false;
    let musicaPlaying = false;

    function initAudio() {
      if (audioHabilitado) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        startMusicaArabe();
        audioHabilitado = true;
        audioMessage.classList.add('show');
        setTimeout(() => audioMessage.classList.remove('show'), 3000);
      } catch (e) {
        console.log('Audio no disponible:', e);
      }
    }

    function startMusicaArabe() {
      if (!audioContext || musicaPlaying) return;
      musicaPlaying = true;
      const notas = [110, 130.81, 146.83, 164.81, 196.00];
      let indice = 0;
      
      function tocar() {
        if (!musicaPlaying || !audioContext) return;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.type = 'sine';
        osc.frequency.value = notas[indice];
        gain.gain.value = 0.06;
        osc.start();
        osc.stop(audioContext.currentTime + 2.0);
        gain.gain.setValueAtTime(0, audioContext.currentTime);
        gain.gain.linearRampToValueAtTime(0.06, audioContext.currentTime + 0.1);
        gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 1.9);
        indice = (indice + 1) % notas.length;
        setTimeout(tocar, 2400);
      }
      tocar();
    }

    function stopMusicaArabe() { musicaPlaying = false; }

    function crearSonido(frecuencia, tipo, duracion, volumen = 0.3) {
      return () => {
        if (!audioContext) return;
        try {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.connect(gain);
          gain.connect(audioContext.destination);
          osc.type = tipo || 'sine';
          osc.frequency.value = frecuencia;
          gain.gain.value = volumen;
          osc.start();
          osc.stop(audioContext.currentTime + (duracion || 0.2));
          if (duracion) {
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duracion);
          }
        } catch (e) {}
      };
    }

    const sonidoSuspiro = crearSonido(300, 'sine', 0.4, 0.15);
    const sonidoChoque = crearSonido(120, 'square', 0.15, 0.4);
    const sonidoSalto = crearSonido(450, 'sine', 0.12, 0.25);
    const sonidoTos = () => {
      if (!audioContext) return;
      crearSonido(200, 'square', 0.3, 0.6)();
      setTimeout(() => crearSonido(100, 'sawtooth', 0.5, 0.3)(), 100);
    };
    const sonidoEuro = () => {
      if (!audioContext) return;
      crearSonido(800, 'sine', 0.1, 0.3)();
      setTimeout(() => crearSonido(600, 'sine', 0.1, 0.25)(), 100);
    };
    const sonidoCerdo = crearSonido(180, 'sawtooth', 0.3, 0.4);

    // ==================== GESTOS MÓVIL ====================
    let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;
    let touchStartTime = 0;
    let contadorSwipesAbajo = 0;
    let tiempoPrimerSwipeAbajo = 0;
    let timeoutResetEURO = null;
    
    function resetContadorEURO() {
      contadorSwipesAbajo = 0;
      tiempoPrimerSwipeAbajo = 0;
      if (timeoutResetEURO) {
        clearTimeout(timeoutResetEURO);
        timeoutResetEURO = null;
      }
    }

    canvas.addEventListener('touchstart', (e) => {
      if (juego.estado !== 'jugando') return;
      touchStartTime = Date.now();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      if (juego.estado !== 'jugando') return;
      const ahora = Date.now();
      const duracionSwipe = ahora - touchStartTime;
      touchEndX = e.changedTouches[0].clientX;
      touchEndY = e.changedTouches[0].clientY;
      if (duracionSwipe <= tiempoMaximoSwipe) {
        detectarSwipe();
      }
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (juego.estado === 'jugando') e.preventDefault();
    }, { passive: false });

    function detectarSwipe() {
      const diffX = touchEndX - touchStartX;
      const diffY = touchEndY - touchStartY;
      
      if (Math.abs(diffX) > Math.abs(diffY)) {
        resetContadorEURO();
        if (diffX > umbralSwipe && jugador.carril < 2) {
          jugador.carril++;
          jugador.carrilCambiado = true;
        } else if (diffX < -umbralSwipe && jugador.carril > 0) {
          jugador.carril--;
          jugador.carrilCambiado = true;
        }
        return;
      }
      
      if (diffY > umbralSwipe && diffY < umbralSwipeEURO && jugador.enSuelo && !jugador.agachado) {
        resetContadorEURO();
        jugador.agachado = true;
        jugador.altoVirtual = 40;
        return;
      }
      
      if (diffY < -umbralSwipe && jugador.enSuelo) {
        resetContadorEURO();
        jugador.vy = -15;
        jugador.enSuelo = false;
        jugador.saltando = true;
        sonidoSalto();
        return;
      }
      
      if (diffY >= umbralSwipeEURO) {
        const ahora = Date.now();
        if (contadorSwipesAbajo === 0) {
          tiempoPrimerSwipeAbajo = ahora;
          contadorSwipesAbajo = 1;
        } else if (ahora - tiempoPrimerSwipeAbajo < 1000) {
          contadorSwipesAbajo++;
          if (contadorSwipesAbajo >= 3 && !jugador.trucoEuro.usado) {
            activarTrucoEuro();
            resetContadorEURO();
            return;
          }
        } else {
          resetContadorEURO();
          contadorSwipesAbajo = 1;
          tiempoPrimerSwipeAbajo = ahora;
        }
        if (timeoutResetEURO) clearTimeout(timeoutResetEURO);
        timeoutResetEURO = setTimeout(resetContadorEURO, 1000);
      }
    }

    // ==================== CONTROLES TECLADO ====================
    document.addEventListener('keydown', (e) => {
      if (juego.estado !== 'jugando') return;
      
      switch(e.key) {
        case 'ArrowLeft':
          if (jugador.carril > 0) {
            jugador.carril--;
            jugador.carrilCambiado = true;
          }
          break;
        case 'ArrowRight':
          if (jugador.carril < 2) {
            jugador.carril++;
            jugador.carrilCambiado = true;
          }
          break;
        case 'ArrowUp':
          if (jugador.enSuelo) {
            jugador.vy = -15;
            jugador.enSuelo = false;
            jugador.saltando = true;
            sonidoSalto();
          }
          break;
        case 'ArrowDown':
          if (jugador.enSuelo && !jugador.agachado) {
            jugador.agachado = true;
            jugador.altoVirtual = 40;
          }
          break;
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowDown') {
        jugador.agachado = false;
        jugador.altoVirtual = 65;
      }
    });

    // ==================== ESTADO DEL JUEGO ====================
    const juego = {
      estado: 'menu',
      score: 0,
      velocidadBase: 4.8,
      velocidad: 4.8,
      tiempo: 0,
      frecuenciaObstaculos: 90,
      contadorObstaculos: 0,
      pantallaRoja: 0,
      record: localStorage.getItem('segarroRecord') ? parseInt(localStorage.getItem('segarroRecord')) : 0,
      choquesSinMorir: 0,
      totalCigarrosReales: 0,
      combo: 0,
      ultimoScoreBump: 0
    };

    recordDisplay.textContent = `RÉCORD: ${juego.record}`;

    // ==================== JUGADOR ====================
    const jugador = {
      carril: CARRILES.CENTRO,
      yVirtual: POS_Y_BASE_VIRTUAL,
      vy: 0,
      anchoVirtual: 35,
      altoVirtual: 65,
      colorPiel: '#6d4c41',
      colorRopa: '#2e7d32',
      colorZapatos: '#212121',
      saltando: false,
      agachado: false,
      enSuelo: true,
      gravedad: 0.6,
      vidas: 1,
      cigarros: 0,
      invulnerable: false,
      tiempoInvulnerable: 0,
      trucoEuro: { usado: false },
      pakiRicoh: {

        cambiosRestantes: 0,
        proximoCambio: 60,
        direccion: 0
      },
      enEscenaFinal: false,
      amigos: [],
      carrilCambiado: false
    };

    // ==================== OBSTÁCULOS ====================
    const obstaculos = [];
    const cigarros = [];
    const cerdos = [];

    // ==================== FUNCIONES DEL JUEGO ====================
    function activarTrucoEuro() {
      if (jugador.trucoEuro.usado || jugador.pakiRicoh.activo || jugador.enEscenaFinal) return;
      
      jugador.trucoEuro.usado = true;
      juego.estado = 'pausado_truco';
      jugador.vidas++;
      vidasDisplay.textContent = jugador.vidas;
      
      textosEmergentes.push(new TextoEmergente(
        "€URO", 
        virtualX(400), virtualY(300),
        '#ffd700', { gigante: true, vibrar: true, rebote: true }
      ));
      
      // Explosión de partículas doradas
      crearExplosion(virtualX(400), virtualY(300), '#ffd700', 30);
      screenShake(10);
      sonidoEuro();
      
      setTimeout(() => {
        if (juego.estado === 'pausado_truco') juego.estado = 'jugando';
      }, 2000);
    }

    function generarObstaculo() {
      if (juego.contadorObstaculos >= juego.frecuenciaObstaculos) {
        const random = Math.random();
        
        if (random < 0.45) {
          const carril = Math.floor(Math.random() * 3);
          obstaculos.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 28,
            yVirtual: -90,
            anchoVirtual: 56,
            altoVirtual: 75,
            carril: carril,
            tipo: 'policia',
            velocidadExtra: 0,
            colorUniforme: '#2196f3',
            colorGorra: '#1565c0'
          });
        } else if (random < 0.67) {
          const carril = Math.floor(Math.random() * 3);
          obstaculos.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 28,
            yVirtual: -90,
            anchoVirtual: 56,
            altoVirtual: 75,
            carril: carril,
            tipo: 'policia',
            velocidadExtra: 1,
            colorUniforme: '#1565c0',
            colorGorra: '#0a3a75'
          });
        } else if (random < 0.75) {
          const carril = Math.floor(Math.random() * 3);
          cerdos.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 30,
            yVirtual: -70,
            anchoVirtual: 60,
            altoVirtual: 50,
            carril: carril,
            tipo: 'cerdo'
          });
        } else {
          const carril = Math.floor(Math.random() * 3);
          cigarros.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 22,
            yVirtual: -65,
            anchoVirtual: 44,
            altoVirtual: 30,
            carril: carril,
            tipo: 'cigarro',
            tiempoBrasa: 0,
            flotacion: Math.random() * Math.PI * 2
          });
        }
        
        juego.contadorObstaculos = 0;
      } else {
        juego.contadorObstaculos++;
      }
    }

    function moverObstaculos() {
      for (let i = obstaculos.length - 1; i >= 0; i--) {
        obstaculos[i].yVirtual += juego.velocidad + obstaculos[i].velocidadExtra;
        if (obstaculos[i].yVirtual > 700) obstaculos.splice(i, 1);
      }
      
      for (let i = cerdos.length - 1; i >= 0; i--) {
        cerdos[i].yVirtual += 1.5;
        if (cerdos[i].yVirtual > 700) cerdos.splice(i, 1);
      }
      
      for (let i = cigarros.length - 1; i >= 0; i--) {
        cigarros[i].yVirtual += juego.velocidad;
        cigarros[i].tiempoBrasa = (cigarros[i].tiempoBrasa + 1) % 20;
        cigarros[i].flotacion += 0.1;
        if (cigarros[i].yVirtual > 700) cigarros.splice(i, 1);
      }
    }

    function detectarColisiones() {
      const jugadorXVirtual = POS_X_CARRIL_VIRTUAL[jugador.carril] - jugador.anchoVirtual / 2;
      const jugadorYVirtual = jugador.yVirtual - jugador.altoVirtual / 2;
      
      // Policías
      for (let i = obstaculos.length - 1; i >= 0; i--) {
        const obs = obstaculos[i];
        const obsXVirtual = obs.xVirtual;
        const obsYVirtual = obs.yVirtual - obs.altoVirtual / 2;
        
        if (jugador.pakiRicoh.activo) {
          if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                      obsXVirtual, obsYVirtual, obs.anchoVirtual, obs.altoVirtual)) {
            if (Math.random() < 0.3) {
              textosEmergentes.push(new TextoEmergente(
                "RECISTA", 
                virtualX(POS_X_CARRIL_VIRTUAL[obs.carril]), virtualY(obs.yVirtual - 60),
                '#ff4d4d'
              ));
            }
          }
          continue;
        }
        
        if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                    obsXVirtual, obsYVirtual, obs.anchoVirtual, obs.altoVirtual)) {
          if (!jugador.invulnerable) {
            sonidoChoque();
            juego.choquesSinMorir++;
            juego.combo = 0;
            actualizarCombo();
            
            if (juego.choquesSinMorir >= 3) {
              textosEmergentes.push(new TextoEmergente(
                "MI CARTERA¡", 
                virtualX(POS_X_CARRIL_VIRTUAL[obs.carril]), virtualY(obs.yVirtual - 70),
                '#ffd166', { gigante: true, vibrar: true }
              ));
              juego.choquesSinMorir = 0;
            }
            
            textosEmergentes.push(new TextoEmergente(
              "RECISTA", 
              virtualX(POS_X_CARRIL_VIRTUAL[obs.carril]), virtualY(obs.yVirtual - 60),
              '#ff4d4d'
            ));
            
            // Efectos visuales de daño
            crearExplosion(virtualX(POS_X_CARRIL_VIRTUAL[jugador.carril]), virtualY(jugador.yVirtual), '#ff4d4d', 20);
            screenShake(15);
            juego.pantallaRoja = 30;
            
            if (jugador.vidas > 1) {
              jugador.vidas--;
              vidasDisplay.textContent = jugador.vidas;
              jugador.invulnerable = true;
              jugador.tiempoInvulnerable = 90;
            } else {
              gameOver();
            }
          }
          obstaculos.splice(i, 1);
        }
      }
      
      // Cerdos
      for (let i = cerdos.length - 1; i >= 0; i--) {
        const cerdo = cerdos[i];
        const cerdoXVirtual = cerdo.xVirtual;
        const cerdoYVirtual = cerdo.yVirtual - cerdo.altoVirtual / 2;
        
        if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                    cerdoXVirtual, cerdoYVirtual, cerdo.anchoVirtual, cerdo.altoVirtual)) {
          if (!jugador.invulnerable) {
            sonidoCerdo();
            jugador.vidas--;
            vidasDisplay.textContent = jugador.vidas;
            juego.combo = 0;
            actualizarCombo();
            
            textosEmergentes.push(new TextoEmergente(
              "YALLAH", 
              virtualX(POS_X_CARRIL_VIRTUAL[cerdo.carril]), virtualY(cerdo.yVirtual - 65),
              '#ff4d4d', { gigante: true, vibrar: true }
            ));
            
            crearExplosion(virtualX(POS_X_CARRIL_VIRTUAL[cerdo.carril]), virtualY(cerdo.yVirtual), '#ff80ab', 25);
            screenShake(20);
            juego.pantallaRoja = 35;
            
            if (jugador.vidas <= 0) {
              gameOver();
            } else {
              jugador.invulnerable = true;
              jugador.tiempoInvulnerable = 90;
            }
          }
          cerdos.splice(i, 1);
        }
      }
      
      // Cigarros
      for (let i = cigarros.length - 1; i >= 0; i--) {
        const cig = cigarros[i];
        const cigXVirtual = cig.xVirtual;
        const cigYVirtual = cig.yVirtual - cig.altoVirtual / 2;
        
        if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                    cigXVirtual, cigYVirtual, cig.anchoVirtual, cig.altoVirtual)) {
          sonidoSuspiro();
          juego.combo++;
          actualizarCombo();
          
          textosEmergentes.push(new TextoEmergente(
            juego.combo > 1 ? `SEGARRO x${juego.combo}` : "SEGARRO", 
            virtualX(POS_X_CARRIL_VIRTUAL[cig.carril]), virtualY(cig.yVirtual - 55),
            '#ffd166', { rebote: true }
          ));
          
          // Partículas doradas al recoger
          crearExplosion(virtualX(POS_X_CARRIL_VIRTUAL[cig.carril]), virtualY(cig.yVirtual), '#ffd166', 12);
          
          jugador.cigarros++;
          juego.totalCigarrosReales++;
          cigarrosDisplay.textContent = jugador.cigarros;
          
          if (jugador.cigarros >= 5) {
            jugador.vidas++;
            jugador.cigarros = 0;
            cigarrosDisplay.textContent = jugador.cigarros;
            vidasDisplay.textContent = jugador.vidas;
            
            textosEmergentes.push(new TextoEmergente(
              "AMIGOO", 
              virtualX(POS_X_CARRIL_VIRTUAL[jugador.carril]), virtualY(jugador.yVirtual - 60),
              '#ffd700', { gigante: true, vibrar: true, rebote: true }
            ));
            
            crearExplosion(virtualX(POS_X_CARRIL_VIRTUAL[jugador.carril]), virtualY(jugador.yVirtual), '#ffd700', 30);
            screenShake(8);
          }
          
          if (juego.totalCigarrosReales % 10 === 0 && juego.totalCigarrosReales > 0) {
            activarPakiRicoh();
          }
          
          cigarros.splice(i, 1);
        }
      }
    }

    function colision(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }

    function actualizarCombo() {
      if (juego.combo > 1) {
        comboDisplay.textContent = `x${juego.combo}`;
        comboDisplay.classList.add('show');
      } else {
        comboDisplay.classList.remove('show');
      }
    }

    function activarPakiRicoh() {
      jugador.pakiRicoh.activo = true;
      jugador.pakiRicoh.contador = 0;
      jugador.pakiRicoh.duracion = 420;
      
      textosEmergentes.push(new TextoEmergente(
        "¡PAKI RICOH!", 
        virtualX(400), virtualY(300),
        '#ffd700', { gigante: true, vibrar: true, rebote: true }
      ));
      
      crearExplosion(virtualX(400), virtualY(300), '#ffd700', 40);
      screenShake(12);
      
      if (audioContext) {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.type = 'sine';
        osc.frequency.value = 600;
        gain.gain.value = 0.35;
        osc.start();
        osc.stop(audioContext.currentTime + 0.4);
      }
    }

    function actualizarPakiRicoh() {
      if (!jugador.pakiRicoh.activo) return;
      
      jugador.pakiRicoh.contador++;
      
      // Humo constante
      if (Math.random() < 0.4) {
        crearHumo(
          virtualX(POS_X_CARRIL_VIRTUAL[jugador.carril] + (Math.random() - 0.5) * 25),
          virtualY(jugador.yVirtual - 25)
        );
      }
      
      if (jugador.pakiRicoh.contador >= jugador.pakiRicoh.duracion) {
        terminarPakiRicoh();
      }
    }

    function terminarPakiRicoh() {
      jugador.pakiRicoh.activo = false;
      
      textosEmergentes.push(new TextoEmergente(
        "..", 
        virtualX(POS_X_CARRIL_VIRTUAL[jugador.carril]), virtualY(jugador.yVirtual - 50),
        '#ffffff'
      ));
      sonidoTos();
    }

    function actualizarJugador() {
      if (juego.pantallaRoja > 0) juego.pantallaRoja--;
      
      if (!jugador.enSuelo) {
        jugador.vy += jugador.gravedad;
        jugador.yVirtual += jugador.vy;
        if (jugador.yVirtual >= POS_Y_BASE_VIRTUAL) {
          jugador.yVirtual = POS_Y_BASE_VIRTUAL;
          jugador.vy = 0;
          jugador.enSuelo = true;
          jugador.saltando = false;
        }
      }
      
      if (jugador.invulnerable) {
        jugador.tiempoInvulnerable--;
        if (jugador.tiempoInvulnerable <= 0) jugador.invulnerable = false;
      }
      
      if (jugador.agachado && !jugador.enSuelo) {
        jugador.agachado = false;
        jugador.altoVirtual = 65;
      }
      
      // Trail del jugador
      if (juego.tiempo % 3 === 0 && !jugador.enEscenaFinal) {
        crearTrail(
          virtualX(POS_X_CARRIL_VIRTUAL[jugador.carril]),
          virtualY(jugador.yVirtual + 20),
          jugador.pakiRicoh.activo ? '#ffd700' : '#2e7d32'
        );
      }
      
      actualizarPakiRicoh();
    }

    function actualizarDificultad() {
      juego.score++;
      
      // Bump animation para score
      if (juego.score - juego.ultimoScoreBump >= 100) {
        scoreDisplay.classList.add('bump');
        setTimeout(() => scoreDisplay.classList.remove('bump'), 100);
        juego.ultimoScoreBump = juego.score;
      }
      
      scoreDisplay.textContent = `SCORE: ${juego.score}`;
      
      // Actualizar barra de velocidad
      const velocidadNivel = Math.min(100, ((juego.velocidad - 4.8) / 4.2) * 100);
      speedBar.style.width = `${20 + velocidadNivel * 0.8}%`;
      
      juego.velocidad = 4.8;
      if (juego.score >= 1000) juego.velocidad += 0.6;
      if (juego.score >= 2000) juego.velocidad += 0.6;
      if (juego.score >= 3500) juego.velocidad += 0.6;
      if (juego.score >= 5500) juego.velocidad += 0.6;
      if (juego.score >= 8000) juego.velocidad += 0.6;
      if (juego.score >= 11000) juego.velocidad += 0.6;
      if (juego.score >= 15000) juego.velocidad += 0.6;
      
      if (juego.score >= 30000 && juego.estado !== 'final') {
        escenaFinal();
        return;
      }
      
      if (juego.score % 1200 === 0 && juego.frecuenciaObstaculos > 40) {
        juego.frecuenciaObstaculos -= 6;
      }
    }

    function actualizarTextos() {
      for (let i = textosEmergentes.length - 1; i >= 0; i--) {
        textosEmergentes[i].actualizar();
        if (textosEmergentes[i].estaMuerto()) textosEmergentes.splice(i, 1);
      }
    }

    function actualizarParticulas() {
      for (let i = particulas.length - 1; i >= 0; i--) {
        particulas[i].actualizar();
        if (particulas[i].estaMuerta()) particulas.splice(i, 1);
      }
    }

    function escenaFinal() {
      juego.estado = 'final';
      jugador.enEscenaFinal = true;
      stopMusicaArabe();
      
      if (audioContext) {
        const notas = [110, 130.81, 146.83];
        let indice = 0;
        function tocar() {
          if (!audioContext) return;
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.connect(gain);
          gain.connect(audioContext.destination);
          osc.type = 'sine';
          osc.frequency.value = notas[indice];
          gain.gain.value = 0.08;
          osc.start();
          osc.stop(audioContext.currentTime + 1.2);
          gain.gain.setValueAtTime(0.08, audioContext.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.2);
          indice = (indice + 1) % notas.length;
          setTimeout(tocar, 1800);
        }
        tocar();
      }
      
      jugador.amigos = [];
      const posiciones = [
        { x: 300, y: 410, colorPiel: '#795548', colorRopa: '#d32f2f' },
        { x: 360, y: 425, colorPiel: '#5d4037', colorRopa: '#1976d2' },

    function gameOver() {
      juego.estado = 'gameover';
      
      if (juego.score > juego.record) {
        juego.record = juego.score;
        localStorage.setItem('segarroRecord', juego.record.toString());
        recordDisplay.textContent = `RÉCORD: ${juego.record}`;
      }
      
      finalScoreDisplay.textContent = `SCORE: ${juego.score}`;
      bestRecordDisplay.textContent = `MEJOR RÉCORD: ${juego.record}`;
      gameOverPanel.classList.add('show');
      
      screenShake(25);
      crearExplosion(virtualX(400), virtualY(300), '#ff4d4d', 50);
      
      if (audioContext) {
        const osc1 = audioContext.createOscillator();
        const osc2 = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioContext.destination);
        osc1.frequency.value = 650;
        osc2.frequency.value = 850;
        gain.gain.value = 0.2;
        osc1.start();
        osc2.start();
        
        let asc = true;
        const int = setInterval(() => {
          if (!audioContext) { clearInterval(int); return; }
          osc1.frequency.value = asc ? 850 : 650;
          osc2.frequency.value = asc ? 1050 : 850;
          asc = !asc;
        }, 300);
        
        setTimeout(() => {
          clearInterval(int);
          osc1.stop();
          osc2.stop();
        }, 2500);
      }
      
      stopMusicaArabe();
    }

      juego.frecuenciaObstaculos = 90;

    // ==================== RENDERIZADO MEJORADO ====================
    function dibujarFondo() {
      ctx.save();
      ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));
      
      // Fondo con gradiente más rico
      const grad = ctx.createLinearGradient(0, 0, 0, 600);
      grad.addColorStop(0, '#0f0c29');
      grad.addColorStop(0.3, '#1a1a2e');
      grad.addColorStop(0.6, '#162447');
      grad.addColorStop(1, '#0f3460');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 800, 600);
      
      // Estrellas con parallax
      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      for (let i = 0; i < 50; i++) {
        const x = (i * 73 + juego.tiempo * 0.02) % 800;
        const y = (i * 41) % 200;
        const size = 0.5 + (i % 3) * 0.5;
        const twinkle = 0.5 + Math.sin(juego.tiempo * 0.1 + i) * 0.5;
        ctx.globalAlpha = twinkle;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      // Montañas con parallax mejorado
      ctx.fillStyle = '#2d3142';
      dibujarMontanas(0.3, 0, 250, 200, 200, 350, 200, 400, 300, 600, 200, 800, 300);
      ctx.fillStyle = '#1e2736';
      dibujarMontanas(0.6, 0, 300, 150, 250, 350, 150, 550, 250, 750, 300, 800, 400);
      ctx.fillStyle = '#141e2b';
      dibujarMontanas(0.9, 0, 400, 100, 300, 400, 100, 600, 300, 800, 400, 800, 600);
      
      // Nubes animadas con glow
      for (let i = 0; i < 5; i++) {
        const x = (juego.tiempo * 0.15 + i * 200) % 1000 - 100;
        const y = 80 + Math.sin(juego.tiempo * 0.03 + i) * 15;
        
        ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
        ctx.shadowBlur = 20;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
        ctx.beginPath();
        ctx.arc(x, y, 35, 0, Math.PI * 2);
        ctx.arc(x + 30, y - 10, 28, 0, Math.PI * 2);
        ctx.arc(x + 55, y, 32, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      
      // Líneas de carril con glow
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
      ctx.lineWidth = 4;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(i * 200, 0);
        ctx.lineTo(i * 200, 600);
        ctx.stroke();
      }
      
      // Línea central con glow
      ctx.shadowColor = 'rgba(255, 209, 102, 0.5)';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.setLineDash([25, 15]);
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(400, 0);
      ctx.lineTo(400, 600);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;
      
      // Marcas de velocidad con glow dinámico
      const glowIntensity = 0.3 + (juego.velocidad - 4.8) * 0.1;
      ctx.shadowColor = `rgba(255, 209, 102, ${glowIntensity})`;
      ctx.shadowBlur = 15;
      ctx.strokeStyle = `rgba(255, 209, 102, ${0.3 + glowIntensity})`;
      ctx.lineWidth = 3;
      for (let i = 0; i < 20; i++) {
        const y = (juego.tiempo * juego.velocidad * 0.3 + i * 35) % 600;
        ctx.beginPath();
        ctx.moveTo(335, y);
        ctx.lineTo(465, y);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      
      ctx.restore();
    }

    function dibujarMontanas(factor, ...puntos) {
      ctx.beginPath();
      ctx.moveTo(puntos[0], puntos[1]);
      for (let i = 2; i < puntos.length; i += 2) {
        ctx.lineTo(puntos[i], puntos[i+1]);
      }
      ctx.lineTo(800, 600);
      ctx.lineTo(0, 600);
      ctx.fill();
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.beginPath();
      ctx.moveTo(puntos[0], puntos[1]);
      for (let i = 2; i < puntos.length; i += 2) {
        ctx.lineTo(puntos[i], puntos[i+1] + 15);
      }
      ctx.lineTo(800, 600);
      ctx.lineTo(0, 600);
      ctx.fill();
    }

    function dibujarJugador() {
      if (jugador.enEscenaFinal) {
        dibujarEscenaFinal();
        return;
      }
      
      ctx.save();
      ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));
      
      const xVirtual = POS_X_CARRIL_VIRTUAL[jugador.carril] - jugador.anchoVirtual / 2;
      const yVirtual = jugador.yVirtual;
      
      if (jugador.invulnerable && Math.floor(Date.now() / 80) % 2 === 0) {
        ctx.globalAlpha = 0.5;
      }
      
      // Glow durante Paki Ricoh
      if (jugador.pakiRicoh.activo) {
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 40;
        
        // Aura dorada
        const gradient = ctx.createRadialGradient(
          xVirtual + jugador.anchoVirtual/2, yVirtual - jugador.altoVirtual/2,
          0,
          xVirtual + jugador.anchoVirtual/2, yVirtual - jugador.altoVirtual/2,
          60
        );
        gradient.addColorStop(0, 'rgba(255, 215, 0, 0.3)');
        gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(xVirtual + jugador.anchoVirtual/2, yVirtual - jugador.altoVirtual/2, 60, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Cuerpo con gradiente
      const bodyGrad = ctx.createLinearGradient(xVirtual, yVirtual - jugador.altoVirtual, xVirtual + jugador.anchoVirtual, yVirtual);
      bodyGrad.addColorStop(0, '#3e8e41');
      bodyGrad.addColorStop(0.5, jugador.colorRopa);
      bodyGrad.addColorStop(1, '#1b5e20');
      ctx.fillStyle = bodyGrad;
      
      ctx.beginPath();
      ctx.moveTo(xVirtual + 5, yVirtual - jugador.altoVirtual);
      ctx.lineTo(xVirtual + jugador.anchoVirtual - 5, yVirtual - jugador.altoVirtual);
      ctx.lineTo(xVirtual + jugador.anchoVirtual - 5, yVirtual - 15);
      ctx.lineTo(xVirtual + jugador.anchoVirtual - 15, yVirtual);
      ctx.lineTo(xVirtual + 15, yVirtual);
      ctx.lineTo(xVirtual + 5, yVirtual - 15);
      ctx.closePath();
      ctx.fill();
      
      // Highlight en ropa
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.beginPath();
      ctx.moveTo(xVirtual + 8, yVirtual - jugador.altoVirtual + 5);
      ctx.lineTo(xVirtual + 18, yVirtual - jugador.altoVirtual + 5);
      ctx.lineTo(xVirtual + 15, yVirtual - 30);
      ctx.lineTo(xVirtual + 10, yVirtual - 30);
      ctx.closePath();
      ctx.fill();
      
      // Cabeza con gradiente
      ctx.fillStyle = '#4e342e';
      ctx.beginPath();
      ctx.arc(xVirtual + jugador.anchoVirtual / 2, yVirtual - jugador.altoVirtual - 5, 17, 0, Math.PI * 2);
      ctx.fill();
      
      const headGrad = ctx.createRadialGradient(
        xVirtual + jugador.anchoVirtual / 2 - 3, yVirtual - jugador.altoVirtual - 8, 2,
        xVirtual + jugador.anchoVirtual / 2, yVirtual - jugador.altoVirtual - 5, 15
      );
      headGrad.addColorStop(0, '#8d6e63');
      headGrad.addColorStop(1, jugador.colorPiel);
      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.arc(xVirtual + jugador.anchoVirtual / 2, yVirtual - jugador.altoVirtual - 5, 15, 0, Math.PI * 2);
      ctx.fill();
      
      // Ojos
      if (jugador.pakiRicoh.activo) {
        // Gafas de sol doradas
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(xVirtual + 9, yVirtual - jugador.altoVirtual - 13, 17, 8);
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(xVirtual + 10, yVirtual - jugador.altoVirtual - 12, 3, 6);
        ctx.fillRect(xVirtual + 22, yVirtual - jugador.altoVirtual - 12, 3, 6);
      } else {
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(xVirtual + 12, yVirtual - jugador.altoVirtual - 8, 4.5, 0, Math.PI * 2);
        ctx.arc(xVirtual + 23, yVirtual - jugador.altoVirtual - 8, 4.5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#2d1f1a';
        const eyeOffset = Math.sin(juego.tiempo / 10) * 0.8;
        ctx.beginPath();
        ctx.arc(xVirtual + 12 + eyeOffset, yVirtual - jugador.altoVirtual - 8, 2.5, 0, Math.PI * 2);
        ctx.arc(xVirtual + 23 + eyeOffset, yVirtual - jugador.altoVirtual - 8, 2.5, 0, Math.PI * 2);
        ctx.fill();
        
        // Brillo en ojos
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(xVirtual + 11, yVirtual - jugador.altoVirtual - 9, 1, 0, Math.PI * 2);
        ctx.arc(xVirtual + 22, yVirtual - jugador.altoVirtual - 9, 1, 0, Math.PI * 2);
        ctx.fill();
        
        // Sonrisa
        ctx.strokeStyle = '#3e2723';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(xVirtual + 17.5, yVirtual - jugador.altoVirtual - 2, 5, 0.1 * Math.PI, 0.9 * Math.PI);
        ctx.stroke();
      }
      
      // Brazos animados
      const offsetBrazos = Math.sin(juego.tiempo / 4) * 18;
      ctx.fillStyle = jugador.colorPiel;
      
      if (jugador.agachado) {
        ctx.fillRect(xVirtual - 10, yVirtual - 35, 10, 25);
        ctx.fillRect(xVirtual + jugador.anchoVirtual, yVirtual - 35, 10, 25);
      } else if (jugador.saltando) {
        ctx.fillRect(xVirtual - 12, yVirtual - jugador.altoVirtual - 15, 12, 30);
        ctx.fillRect(xVirtual + jugador.anchoVirtual, yVirtual - jugador.altoVirtual - 15, 12, 30);
      } else {
        ctx.fillRect(xVirtual - 12, yVirtual - 45 + offsetBrazos, 12, 30);
        ctx.fillRect(xVirtual + jugador.anchoVirtual, yVirtual - 45 - offsetBrazos, 12, 30);
      }
      
      // Piernas con gradiente
      const legGrad = ctx.createLinearGradient(xVirtual, yVirtual - 20, xVirtual, yVirtual + 35);
      legGrad.addColorStop(0, '#283593');
      legGrad.addColorStop(1, '#1a237e');
      ctx.fillStyle = legGrad;
      const offsetPiernas = Math.sin(juego.tiempo / 4) * 12;
      
      if (jugador.agachado) {
        ctx.fillRect(xVirtual + 8, yVirtual - 25, 10, 30);
        ctx.fillRect(xVirtual + 17, yVirtual - 25, 10, 30);
      } else {
        ctx.fillRect(xVirtual + 8, yVirtual - 20 + offsetPiernas, 8, 25);
        ctx.fillRect(xVirtual + 19, yVirtual - 20 - offsetPiernas, 8, 25);
        ctx.fillRect(xVirtual + 9, yVirtual + 5 + offsetPiernas, 6, 22);
        ctx.fillRect(xVirtual + 20, yVirtual + 5 - offsetPiernas, 6, 22);
      }
      
      // Zapatos con highlight
      ctx.fillStyle = jugador.colorZapatos;
      ctx.fillRect(xVirtual + 7, yVirtual + 27, 10, 8);
      ctx.fillRect(xVirtual + 18, yVirtual + 27, 10, 8);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.fillRect(xVirtual + 8, yVirtual + 28, 8, 2);
      ctx.fillRect(xVirtual + 19, yVirtual + 28, 8, 2);
      
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function dibujarPolicia(obs) {
      ctx.save();
      ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));
      
      const xVirtual = obs.xVirtual;
      const yVirtual = obs.yVirtual;
      
      // Sombra debajo
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.ellipse(xVirtual + 28, yVirtual + 25, 25, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Cuerpo con gradiente
      const bodyGrad = ctx.createLinearGradient(xVirtual, yVirtual - 70, xVirtual + 56, yVirtual);
      bodyGrad.addColorStop(0, obs.colorUniforme);
      bodyGrad.addColorStop(0.5, '#1976d2');
      bodyGrad.addColorStop(1, obs.colorGorra);
      ctx.fillStyle = bodyGrad;
      
      ctx.beginPath();
      ctx.moveTo(xVirtual + 8, yVirtual - 70);
      ctx.lineTo(xVirtual + 47, yVirtual - 70);
      ctx.lineTo(xVirtual + 45, yVirtual);
      ctx.lineTo(xVirtual + 10, yVirtual);
      ctx.closePath();
      ctx.fill();
      
      // Botones dorados
      ctx.fillStyle = '#ffc107';
      ctx.shadowColor = '#ffc107';
      ctx.shadowBlur = 5;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(xVirtual + 28, yVirtual - 50 + i * 12, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      
      // Gorra
      ctx.fillStyle = obs.colorGorra;
      ctx.fillRect(xVirtual + 12, yVirtual - 85, 31, 12);
      ctx.beginPath();
      ctx.moveTo(xVirtual + 10, yVirtual - 73);
      ctx.lineTo(xVirtual + 50, yVirtual - 73);
      ctx.lineTo(xVirtual + 45, yVirtual - 80);
      ctx.lineTo(xVirtual + 15, yVirtual - 80);
      ctx.closePath();
      ctx.fill();
      
      // Cara
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(xVirtual + 15, yVirtual - 75, 25, 15);
      
      // Ojos enfadados
      ctx.fillStyle = 'black';
      ctx.fillRect(xVirtual + 20, yVirtual - 70, 4, 4);
      ctx.fillRect(xVirtual + 31, yVirtual - 70, 4, 4);
      
      // Cejas
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(xVirtual + 18, yVirtual - 72);
      ctx.lineTo(xVirtual + 24, yVirtual - 74);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(xVirtual + 30, yVirtual - 74);
      ctx.lineTo(xVirtual + 36, yVirtual - 72);
      ctx.stroke();
      
      // Boca
      ctx.beginPath();
      ctx.moveTo(xVirtual + 22, yVirtual - 63);
      ctx.lineTo(xVirtual + 33, yVirtual - 63);
      ctx.stroke();
      
      // Brazos
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(xVirtual - 5, yVirtual - 60, 10, 35);
      ctx.fillRect(xVirtual + 50, yVirtual - 60, 10, 35);
      
      // Porra
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(xVirtual - 10, yVirtual - 40, 8, 25);
      ctx.fillStyle = '#424242';
      ctx.fillRect(xVirtual - 12, yVirtual - 45, 12, 5);
      
      // Piernas
      ctx.fillStyle = '#0d47a1';
      ctx.fillRect(xVirtual + 15, yVirtual - 10, 10, 30);
      ctx.fillRect(xVirtual + 30, yVirtual - 10, 10, 30);
      
      // Zapatos
      ctx.fillStyle = '#212121';
      ctx.fillRect(xVirtual + 13, yVirtual + 20, 14, 8);
      ctx.fillRect(xVirtual + 28, yVirtual + 20, 14, 8);
      
      // Placa
      ctx.fillStyle = '#ffc107';
      ctx.shadowColor = '#ffc107';
      ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.arc(xVirtual + 45, yVirtual - 60, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // Indicador de rápido
      if (obs.velocidadExtra > 0) {
        ctx.fillStyle = '#ff4d4d';
        ctx.shadowColor = '#ff4d4d';
        ctx.shadowBlur = 10;
        ctx.font = 'bold 13px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('¡RÁPIDO!', xVirtual + 28, yVirtual - 95);
        ctx.shadowBlur = 0;
      }
      
      ctx.restore();
    }

    function dibujarCerdo(cerdo) {
      ctx.save();
      ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));
      
      const xVirtual = cerdo.xVirtual;
      const yVirtual = cerdo.yVirtual;
      
      // Sombra
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.beginPath();
      ctx.ellipse(xVirtual + 30, yVirtual + 15, 28, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Cuerpo con gradiente
      const bodyGrad = ctx.createRadialGradient(xVirtual + 25, yVirtual - 30, 5, xVirtual + 30, yVirtual - 25, 35);
      bodyGrad.addColorStop(0, '#ffb3c1');
      bodyGrad.addColorStop(1, '#ff80ab');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.ellipse(xVirtual + 30, yVirtual - 25, 32, 25, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Cabeza
      ctx.fillStyle = '#ff80ab';
      ctx.beginPath();
      ctx.arc(xVirtual + 30, yVirtual - 45, 20, 0, Math.PI * 2);
      ctx.fill();
      
      // Hocico con gradiente
      const noseGrad = ctx.createRadialGradient(xVirtual + 28, yVirtual - 42, 2, xVirtual + 30, yVirtual - 40, 12);
      noseGrad.addColorStop(0, '#f48fb1');
      noseGrad.addColorStop(1, '#e91e63');
      ctx.fillStyle = noseGrad;
      ctx.beginPath();
      ctx.arc(xVirtual + 30, yVirtual - 40, 12, 0, Math.PI * 2);
      ctx.fill();
      
      // Fosas nasales
      ctx.fillStyle = '#880e4f';
      ctx.beginPath();
      ctx.arc(xVirtual + 26, yVirtual - 42, 3, 0, Math.PI * 2);
      ctx.arc(xVirtual + 34, yVirtual - 42, 3, 0, Math.PI * 2);
      ctx.fill();
      
      // Ojos con brillo
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(xVirtual + 23, yVirtual - 48, 5, 0, Math.PI * 2);
      ctx.arc(xVirtual + 37, yVirtual - 48, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#2d1f1a';
      ctx.beginPath();
      ctx.arc(xVirtual + 24, yVirtual - 48, 2.5, 0, Math.PI * 2);
      ctx.arc(xVirtual + 36, yVirtual - 48, 2.5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(xVirtual + 22, yVirtual - 49, 1, 0, Math.PI * 2);
      ctx.arc(xVirtual + 35, yVirtual - 49, 1, 0, Math.PI * 2);
      ctx.fill();
      
      // Cejas enfadadas
      ctx.strokeStyle = '#4a0e2a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(xVirtual + 18, yVirtual - 53);
      ctx.lineTo(xVirtual + 26, yVirtual - 50);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(xVirtual + 34, yVirtual - 50);
      ctx.lineTo(xVirtual + 42, yVirtual - 53);
      ctx.stroke();
      
      // Orejas con interior
      ctx.fillStyle = '#ff80ab';
      ctx.beginPath();
      ctx.arc(xVirtual + 18, yVirtual - 55, 10, 0.3 * Math.PI, 1.7 * Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(xVirtual + 42, yVirtual - 55, 10, -0.7 * Math.PI, 0.7 * Math.PI);
      ctx.fill();
      
      ctx.fillStyle = '#f48fb1';
      ctx.beginPath();
      ctx.arc(xVirtual + 18, yVirtual - 55, 5, 0.3 * Math.PI, 1.7 * Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(xVirtual + 42, yVirtual - 55, 5, -0.7 * Math.PI, 0.7 * Math.PI);
      ctx.fill();
      
      // Patas
      ctx.fillStyle = '#e91e63';
      ctx.fillRect(xVirtual + 15, yVirtual - 5, 12, 18);
      ctx.fillRect(xVirtual + 33, yVirtual - 5, 12, 18);
      
      // Pezuñas
      ctx.fillStyle = '#880e4f';
      ctx.fillRect(xVirtual + 17, yVirtual + 10, 8, 5);
      ctx.fillRect(xVirtual + 35, yVirtual + 10, 8, 5);
      
      // Cola rizada
      ctx.strokeStyle = '#e91e63';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(xVirtual + 55, yVirtual - 30);
      ctx.bezierCurveTo(
        xVirtual + 68, yVirtual - 25,
        xVirtual + 62, yVirtual - 12,
        xVirtual + 55, yVirtual - 8
      );
      ctx.stroke();
      
      ctx.restore();
    }

    function dibujarCigarro(cig) {
      ctx.save();
      ctx.scale(canvas.width / (800 * dpr), canvas.height / (600 * dpr));
      
      const xVirtual = cig.xVirtual;
      const yVirtual = cig.yVirtual + Math.sin(cig.flotacion) * 3; // Flotación
      
      // Glow alrededor
      ctx.shadowColor = '#ffd166';
      ctx.shadowBlur = 15;
      
      // Paquete con gradiente
      const packGrad = ctx.createLinearGradient(xVirtual + 8, yVirtual - 25, xVirtual + 36, yVirtual - 7);
      packGrad.addColorStop(0, '#a1887f');
      packGrad.addColorStop(0.5, '#8d6e63');
      packGrad.addColorStop(1, '#6d4c41');
      ctx.fillStyle = packGrad;
      ctx.fillRect(xVirtual + 8, yVirtual - 25, 28, 18);
      
      // Textura del paquete
      ctx.strokeStyle = 'rgba(100, 80, 70, 0.4)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(xVirtual + 10, yVirtual - 23 + i * 4);
        ctx.lineTo(xVirtual + 34, yVirtual - 23 + i * 4);
        ctx.stroke();
      }
      
      // Filtro con gradiente
      const filterGrad = ctx.createRadialGradient(xVirtual + 13, yVirtual - 32, 2, xVirtual + 15, yVirtual - 30, 8);
      filterGrad.addColorStop(0, '#bdbdbd');
      filterGrad.addColorStop(1, '#9e9e9e');
      ctx.fillStyle = filterGrad;
      ctx.beginPath();
      ctx.arc(xVirtual + 15, yVirtual - 30, 7, 0, Math.PI * 2);
      ctx.fill();
      
      // Brillo del filtro
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.beginPath();
      ctx.arc(xVirtual + 13, yVirtual - 32, 2.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Brasa animada con glow intenso
      const brillo = 0.7 + Math.sin(cig.tiempoBrasa * 0.35) * 0.3;
      ctx.shadowColor = `rgba(255, 152, 0, ${brillo})`;
      ctx.shadowBlur = 20;
      
      const brasaGrad = ctx.createRadialGradient(xVirtual + 38, yVirtual - 30, 0, xVirtual + 38, yVirtual - 30, 6);
      brasaGrad.addColorStop(0, '#ffeb3b');
      brasaGrad.addColorStop(0.5, '#ff9800');
      brasaGrad.addColorStop(1, '#ff5722');
      ctx.fillStyle = brasaGrad;
      ctx.beginPath();
      ctx.arc(xVirtual + 38, yVirtual - 30, 6, 0, Math.PI * 2);
      ctx.fill();
      
      // Centro brillante de la brasa
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(xVirtual + 38, yVirtual - 31, 2, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function dibujarObstaculos() {
      obstaculos.forEach(obs => dibujarPolicia(obs));
      cerdos.forEach(cerdo => dibujarCerdo(cerdo));
      cigarros.forEach(cig => dibujarCigarro(cig));
    }

    function dibujarParticulas() {
      particulas.forEach(p => p.dibujar(ctx));
    }

    function dibujarTextos() {
      textosEmergentes.forEach(t => t.dibujar(ctx));
    }

    function dibujarEfectoPantallaRoja() {
      if (juego.pantallaRoja > 0) {
        const alpha = juego.pantallaRoja / 40;
        const gradient = ctx.createRadialGradient(
          canvas.clientWidth / 2, canvas.clientHeight / 2, 0,
          canvas.clientWidth / 2, canvas.clientHeight / 2, canvas.clientWidth
        );
        gradient.addColorStop(0, `rgba(255, 50, 50, 0)`);
        gradient.addColorStop(0.5, `rgba(255, 50, 50, ${alpha * 0.3})`);
        gradient.addColorStop(1, `rgba(255, 50, 50, ${alpha})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);
      }
    }

    function actualizarIndicadorCarril() {
      if (jugador.enEscenaFinal) return;
      
      const posicionesX = [
        virtualX(170),
        virtualX(370),
        virtualX(570)
      ];
      carrilIndicator.style.left = `${posicionesX[jugador.carril]}px`;
      
      if (jugador.carrilCambiado) {
        carrilIndicator.classList.add('active');
        setTimeout(() => carrilIndicator.classList.remove('active'), 200);
        jugador.carrilCambiado = false;
      }
    }

    // ==================== BUCLE PRINCIPAL ====================
    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      ctx.save();
      aplicarShake();
      
      if (juego.estado === 'jugando' || juego.estado === 'pausado_truco') {
        actualizarJugador();
        
        if (juego.estado === 'jugando' && !jugador.enEscenaFinal) {
          generarObstaculo();
          moverObstaculos();
          detectarColisiones();
          actualizarDificultad();
        }
        
        actualizarTextos();
        actualizarParticulas();
        actualizarIndicadorCarril();
        
        juego.tiempo++;
      }
      
      if (juego.estado !== 'gameover') {
        dibujarFondo();
        if (!jugador.enEscenaFinal) {
          dibujarObstaculos();
        }
        dibujarJugador();
        dibujarParticulas();
        dibujarTextos();
        dibujarEfectoPantallaRoja();
      }
      
      ctx.restore();
      
      requestAnimationFrame(gameLoop);
    }

    // ==================== INICIAR ====================
    startBtn.addEventListener('click', () => {
      titleScreen.style.display = 'none';
      juego.estado = 'jugando';
      initAudio();
    });
    
    restartBtn.addEventListener('click', reiniciarJuego);
    
    gameLoop();
  </script>
</body>
</html>
