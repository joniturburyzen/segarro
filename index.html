<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EL SEGARRO RUNNER</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a14;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      color: white;
      width: 100vw;
      height: 100vh;
      position: fixed;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #0a0a14;
    }

    #hud {
      position: absolute;
      top: 2%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4vw;
      background: rgba(0, 0, 0, 0.85);
      padding: 1.8vh 3.5vw;
      border-radius: 3vh;
      border: 2px solid #ffd166;
      box-shadow: 0 0 15px rgba(255, 209, 102, 0.7);
      font-size: 2.8vh;
      font-weight: bold;
      z-index: 10;
      white-space: nowrap;
      backdrop-filter: blur(5px);
    }

    #score-display, #record-display {
      position: absolute;
      top: 2%;
      font-size: 3.2vh;
      font-weight: bold;
      color: #ffd166;
      text-shadow: 0 0 8px rgba(255, 209, 102, 0.9), 0 0 15px rgba(255, 77, 77, 0.5);
      font-family: 'Courier New', monospace;
      z-index: 10;
      text-align: center;
      width: 30%;
    }

    #score-display { right: 3%; }
    #record-display { left: 3%; }

    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.92);
      color: #ff4d4d;
      padding: 4vh 6vw;
      border-radius: 4vh;
      border: 4px solid #ff4d4d;
      text-align: center;
      display: none;
      z-index: 20;
      box-shadow: 
        0 0 30px rgba(255, 77, 77, 0.9),
        0 0 50px rgba(255, 209, 102, 0.5);
      width: 85%;
      max-width: 75vw;
    }

    #game-over h2 {
      font-size: 5vh;
      margin-bottom: 4vh;
      text-shadow: 0 0 15px rgba(255, 77, 77, 0.95);
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      background: linear-gradient(45deg, #ff4d4d, #ffd166, #ff4d4d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-stroke: 1px black;
    }

    #game-over p {
      font-size: 3.5vh;
      margin-bottom: 6vh;
      color: #ffd166;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 10px rgba(255, 209, 102, 0.8);
    }

    #restart-btn {
      background: linear-gradient(45deg, #06d6a0, #118ab2, #06d6a0);
      color: white;
      border: none;
      padding: 3vh 10vw;
      font-size: 4.5vh;
      border-radius: 3vh;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
      box-shadow: 0 4px 20px rgba(6, 214, 160, 0.6);
      width: 90%;
      margin: 0 auto;
      display: block;
    }

    #restart-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 25px rgba(6, 214, 160, 0.8);
    }

    #restart-btn:active {
      transform: scale(0.98);
    }

    #instructions {
      position: absolute;
      bottom: 3%;
      color: #a8dadc;
      font-size: 2.4vh;
      text-align: center;
      width: 95%;
      font-family: 'Courier New', monospace;
      background: rgba(0, 0, 0, 0.6);
      padding: 1.5vh 3vw;
      border-radius: 2.5vh;
      z-index: 10;
      text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
    }

    #title-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f0c29, #1a1a2e, #0f0c29);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 30;
      gap: 6vh;
      touch-action: auto;
    }

    #title-screen h1 {
      font-size: 9vh;
      font-weight: bold;
      color: #ffd166;
      text-shadow: 
        0 0 15px rgba(255, 209, 102, 0.9),
        0 0 30px rgba(255, 77, 77, 0.7),
        0 0 45px rgba(255, 209, 102, 0.5);
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
      animation: pulseTitle 2s infinite;
      text-align: center;
      padding: 0 5vw;
      background: linear-gradient(45deg, #ffd166, #ff4d4d, #ffd166);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes pulseTitle {
      0%, 100% { transform: scale(1); text-shadow: 0 0 15px rgba(255, 209, 102, 0.9), 0 0 30px rgba(255, 77, 77, 0.7); }
      50% { transform: scale(1.07); text-shadow: 0 0 25px rgba(255, 209, 102, 1), 0 0 50px rgba(255, 77, 77, 0.9), 0 0 75px rgba(255, 209, 102, 0.7); }
    }

    #start-btn {
      background: linear-gradient(45deg, #ff4d4d, #ffd166, #ff4d4d);
      color: white;
      border: none;
      padding: 4vh 12vw;
      font-size: 6vh;
      border-radius: 4vh;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-family: 'Courier New', monospace;
      box-shadow: 
        0 0 25px rgba(255, 77, 77, 0.8),
        0 0 50px rgba(255, 209, 102, 0.6);
      letter-spacing: 2px;
    }

    #start-btn:hover {
      transform: scale(1.1);
      box-shadow: 
        0 0 35px rgba(255, 77, 77, 0.95),
        0 0 70px rgba(255, 209, 102, 0.8);
    }

    #start-btn:active {
      transform: scale(0.98);
    }

    #carril-indicator {
      position: absolute;
      bottom: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 5vw;
      height: 1.2vh;
      background: linear-gradient(90deg, #4cc9f0, #4361ee, #3a0ca3);
      border-radius: 1vh;
      box-shadow: 0 0 10px rgba(76, 201, 240, 0.8);
      transition: left 0.25s ease-out, width 0.2s;
      z-index: 5;
    }

    #audio-message {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(90deg, #ffd166, #ff9e6d, #ffd166);
      color: #0a0a14;
      padding: 2vh 5vw;
      border-radius: 3vh;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 3vh;
      display: none;
      z-index: 15;
      box-shadow: 0 0 15px rgba(255, 209, 102, 0.9);
      animation: pulseAudio 1.5s infinite;
    }

    @keyframes pulseAudio {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div>
        <span>❤️</span> <span id="vidas-count">1</span>
      </div>
      <div>
        <span>🚬</span> <span id="cigarros-count">0</span>/5
      </div>
    </div>
    <div id="score-display">SCORE: 0</div>
    <div id="record-display">RÉCORD: 0</div>
    <canvas id="game-canvas"></canvas>
    
    <div id="carril-indicator"></div>
    
    <div id="game-over">
      <h2>¡RECISTA!</h2>
      <p id="final-score">SCORE: 0</p>
      <p id="best-record">MEJOR RÉCORD: 0</p>
      <button id="restart-btn">OTRA VEZ, AMIGOO</button>
    </div>
    
    <div id="instructions">
      <p>← → : Carriles | ↑ : Saltar | ↓ : Agacharse | 3↓ rápidos: EURO</p>
    </div>

    <div id="title-screen">
      <h1>EL SEGARRO RUNNER</h1>
      <button id="start-btn">EMPEZAR A FUMAR</button>
    </div>

    <div id="audio-message">🔊 ¡MUSIQUILLA ÁRABE ACTIVADA!</div>
  </div>

  <script>
    // ==================== CONFIGURACIÓN DE ALTA RESOLUCIÓN ====================
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    
    const dpr = window.devicePixelRatio || 1;
    function resizeCanvas() {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.scale(dpr, dpr);
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const scaleX = canvas.width / (800 * dpr);
    const scaleY = canvas.height / (600 * dpr);
    
    function virtualX(x) { return x * scaleX * dpr; }
    function virtualY(y) { return y * scaleY * dpr; }
    function virtualW(w) { return w * scaleX * dpr; }
    function virtualH(h) { return h * scaleY * dpr; }

    // ==================== ELEMENTOS DEL DOM ====================
    const scoreDisplay = document.getElementById('score-display');
    const recordDisplay = document.getElementById('record-display');
    const vidasDisplay = document.getElementById('vidas-count');
    const cigarrosDisplay = document.getElementById('cigarros-count');
    const gameOverPanel = document.getElementById('game-over');
    const finalScoreDisplay = document.getElementById('final-score');
    const bestRecordDisplay = document.getElementById('best-record');
    const restartBtn = document.getElementById('restart-btn');
    const titleScreen = document.getElementById('title-screen');
    const startBtn = document.getElementById('start-btn');
    const audioMessage = document.getElementById('audio-message');
    const carrilIndicator = document.getElementById('carril-indicator');
    const instructions = document.getElementById('instructions');

    const esMovil = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                    ('ontouchstart' in window || navigator.maxTouchPoints > 0);
    
    if (esMovil) {
      instructions.innerHTML = '<p>← → : Carriles | ↑ : Saltar | ↓ : Agacharse | 3↓ rápidos: EURO</p>';
    }

    // ==================== CONSTANTES DEL JUEGO ====================
    const CARRILES = { IZQUIERDA: 0, CENTRO: 1, DERECHA: 2 };
    const POS_X_CARRIL_VIRTUAL = [200, 400, 600];
    const POS_Y_BASE_VIRTUAL = 350;
    const CENTRO_X_VIRTUAL = 400;
    const CENTRO_Y_VIRTUAL = 300;
    
    // SWIPE ULTRA-SENSIBLE (VALIDADO)
    const umbralSwipe = 20;           // 20px = ultra-sensible (~6% pantalla móvil)
    const umbralSwipeEURO = 40;       // EURO requiere swipe más largo (no interfiera)
    const tiempoMaximoSwipe = 400;    // Máximo 400ms por swipe (evita falsos positivos)

    // ==================== AUDIO ====================
    let audioContext;
    let audioHabilitado = false;
    let musicaPlaying = false;

    function initAudio() {
      if (audioHabilitado) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        startMusicaArabe();
        audioHabilitado = true;
        audioMessage.style.display = 'block';
        setTimeout(() => audioMessage.style.display = 'none', 3000);
      } catch (e) {
        console.log('Audio no disponible:', e);
      }
    }

    function startMusicaArabe() {
      if (!audioContext || musicaPlaying) return;
      musicaPlaying = true;
      
      const notas = [110, 130.81, 146.83, 164.81, 196.00];
      let indice = 0;
      
      function tocar() {
        if (!musicaPlaying || !audioContext) return;
        
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.type = 'sine';
        osc.frequency.value = notas[indice];
        gain.gain.value = 0.06;
        
        osc.start();
        osc.stop(audioContext.currentTime + 2.0);
        
        gain.gain.setValueAtTime(0, audioContext.currentTime);
        gain.gain.linearRampToValueAtTime(0.06, audioContext.currentTime + 0.1);
        gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 1.9);
        
        indice = (indice + 1) % notas.length;
        setTimeout(tocar, 2400);
      }
      
      tocar();
    }

    function stopMusicaArabe() { musicaPlaying = false; }

    function crearSonido(frecuencia, tipo, duracion, volumen = 0.3) {
      return () => {
        if (!audioContext) return;
        try {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          
          osc.connect(gain);
          gain.connect(audioContext.destination);
          
          osc.type = tipo || 'sine';
          osc.frequency.value = frecuencia;
          gain.gain.value = volumen;
          
          osc.start();
          osc.stop(audioContext.currentTime + (duracion || 0.2));
          
          if (duracion) {
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duracion);
          }
        } catch (e) {
          console.log('Error sonido:', e);
        }
      };
    }

    const sonidoSuspiro = crearSonido(300, 'sine', 0.4, 0.15);
    const sonidoChoque = crearSonido(120, 'square', 0.15, 0.4);
    const sonidoSalto = crearSonido(450, 'sine', 0.12, 0.25);
    const sonidoTos = () => {
      if (!audioContext) return;
      crearSonido(200, 'square', 0.3, 0.6)();
      setTimeout(() => crearSonido(100, 'sawtooth', 0.5, 0.3)(), 100);
    };
    const sonidoEuro = () => {
      if (!audioContext) return;
      crearSonido(800, 'sine', 0.1, 0.3)();
      setTimeout(() => crearSonido(600, 'sine', 0.1, 0.25)(), 100);
    };
    const sonidoCerdo = crearSonido(180, 'sawtooth', 0.3, 0.4);

    // ==================== GESTOS MÓVIL (ULTRA-SENSIBLE + EURO 3↓) ====================
    let touchStartX = 0, touchStartY = 0, touchEndX = 0, touchEndY = 0;
    let touchStartTime = 0;
    
    // VARIABLES PARA EURO (3 SWIPES ABAJO)
    let contadorSwipesAbajo = 0;
    let tiempoPrimerSwipeAbajo = 0;
    let timeoutResetEURO = null;
    
    // Reset automático del contador EURO
    function resetContadorEURO() {
      contadorSwipesAbajo = 0;
      tiempoPrimerSwipeAbajo = 0;
      if (timeoutResetEURO) {
        clearTimeout(timeoutResetEURO);
        timeoutResetEURO = null;
      }
    }

    canvas.addEventListener('touchstart', (e) => {
      if (juego.estado !== 'jugando') return;
      
      touchStartTime = Date.now();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      if (juego.estado !== 'jugando') return;
      
      const ahora = Date.now();
      const duracionSwipe = ahora - touchStartTime;
      
      touchEndX = e.changedTouches[0].clientX;
      touchEndY = e.changedTouches[0].clientY;
      
      // Ignorar swipes demasiado lentos (>400ms)
      if (duracionSwipe <= tiempoMaximoSwipe) {
        detectarSwipe();
      }
      
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (juego.estado === 'jugando') e.preventDefault();
    }, { passive: false });

    function detectarSwipe() {
      const diffX = touchEndX - touchStartX;
      const diffY = touchEndY - touchStartY;
      
      // PRIORIDAD 1: SWIPE HORIZONTAL (carriles) - RESETEA CONTADOR EURO
      if (Math.abs(diffX) > Math.abs(diffY)) {
        resetContadorEURO();
        
        if (diffX > umbralSwipe && jugador.carril < 2) {
          jugador.carril++;
        } else if (diffX < -umbralSwipe && jugador.carril > 0) {
          jugador.carril--;
        }
        return;
      }
      
      // PRIORIDAD 2: SWIPE VERTICAL
      // Agacharse normal (20-40px) - RESETEA CONTADOR EURO
      if (diffY > umbralSwipe && diffY < umbralSwipeEURO && jugador.enSuelo && !jugador.agachado) {
        resetContadorEURO();
        jugador.agachado = true;
        jugador.altoVirtual = 40;
        return;
      }
      
      // Salto (20px+) - RESETEA CONTADOR EURO
      if (diffY < -umbralSwipe && jugador.enSuelo) {
        resetContadorEURO();
        jugador.vy = -15;
        jugador.enSuelo = false;
        jugador.saltando = true;
        sonidoSalto();
        return;
      }
      
      // EURO: SWIPE ABAJO LARGO (>40px)
      if (diffY >= umbralSwipeEURO) {
        const ahora = Date.now();
        
        if (contadorSwipesAbajo === 0) {
          // Primer swipe
          tiempoPrimerSwipeAbajo = ahora;
          contadorSwipesAbajo = 1;
        } else if (ahora - tiempoPrimerSwipeAbajo < 1000) {
          // Segundo o tercer swipe dentro de 1 segundo
          contadorSwipesAbajo++;
          
          if (contadorSwipesAbajo >= 3 && !jugador.trucoEuro.usado) {
            activarTrucoEuro();
            resetContadorEURO();
            return;
          }
        } else {
          // Más de 1 segundo desde el primer swipe: resetear
          resetContadorEURO();
          contadorSwipesAbajo = 1;
          tiempoPrimerSwipeAbajo = ahora;
        }
        
        // Auto-reset después de 1 segundo de inactividad
        if (timeoutResetEURO) clearTimeout(timeoutResetEURO);
        timeoutResetEURO = setTimeout(resetContadorEURO, 1000);
      }
    }

    // ==================== ESTADO DEL JUEGO ====================
    const juego = {
      estado: 'menu',
      score: 0,
      velocidadBase: 4.8,
      velocidad: 4.8,
      tiempo: 0,
      frecuenciaObstaculos: 90,
      contadorObstaculos: 0,
      pantallaRoja: 0,
      record: localStorage.getItem('segarroRecord') ? parseInt(localStorage.getItem('segarroRecord')) : 0,
      choquesSinMorir: 0,
      totalCigarrosReales: 0
    };

    recordDisplay.textContent = `RÉCORD: ${juego.record}`;

    // ==================== JUGADOR ====================
    const jugador = {
      carril: CARRILES.CENTRO,
      yVirtual: POS_Y_BASE_VIRTUAL,
      vy: 0,
      anchoVirtual: 35,
      altoVirtual: 65,
      colorPiel: '#6d4c41',
      colorRopa: '#2e7d32',
      colorZapatos: '#212121',
      saltando: false,
      agachado: false,
      enSuelo: true,
      gravedad: 0.6,
      vidas: 1,
      cigarros: 0,
      invulnerable: false,
      tiempoInvulnerable: 0,
      trucoEuro: {
        usado: false
      },
      pakiRicoh: {
        activo: false,
        contador: 0,
        duracion: 450, // 7.5 segundos (aumentado de 300)
        humoParticulas: []
      },
      enEscenaFinal: false,
      amigos: []
    };

    // ==================== OBSTÁCULOS ====================
    const obstaculos = [];
    const cigarros = [];
    const cerdos = [];
    const textosEmergentes = [];

    // ==================== CLASES (TEXTOS INSTANTÁNEOS) ====================
    class TextoEmergente {
      constructor(texto, xVirtual, yVirtual, color = '#ffd166', opciones = {}) {
        this.texto = texto;
        this.xVirtual = xVirtual;       // 400 (centro)
        this.yVirtual = yVirtual;       // 300 (centro) - FIJO
        this.color = color;
        this.vida = 90;                 // 90 frames = 1.5 segundos
        this.velocidadY = 0;            // SIN animación de subida
        this.opacidad = 1.0;            // 100% opacidad desde el primer frame
        this.escala = opciones.gigante ? 2.0 : 1.2;
        this.vibrar = opciones.vibrar || false;
        this.tiempo = 0;
      }
      
      actualizar() {
        this.vida--;
        this.tiempo++;
        
        // Fade out suave en los últimos 20 frames (mejor experiencia visual)
        if (this.vida < 20) {
          this.opacidad = this.vida / 20;
        }
      }
      
      dibujar(ctx) {
        ctx.save();
        ctx.globalAlpha = this.opacidad;
        
        let offsetX = this.xVirtual;
        if (this.vibrar) offsetX += Math.sin(this.tiempo * 20) * 2;
        
        ctx.font = `bold ${Math.floor(32 * this.escala)}px 'Courier New', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // Sombra gruesa
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 6 * this.escala;
        ctx.lineJoin = 'round';
        ctx.strokeText(this.texto, virtualX(offsetX), virtualY(this.yVirtual));
        
        // Texto principal
        ctx.fillStyle = this.color;
        ctx.fillText(this.texto, virtualX(offsetX), virtualY(this.yVirtual));
        
        ctx.restore();
      }
      
      estaMuerto() { return this.vida <= 0; }
    }

    class ParticulaHumo {
      constructor(xVirtual, yVirtual) {
        this.xVirtual = xVirtual;
        this.yVirtual = yVirtual;
        this.vx = (Math.random() - 0.5) * 1.2;  // Más dispersión
        this.vy = -1.0 - Math.random() * 0.8;   // Más rápido hacia arriba
        this.radio = 4 + Math.random() * 6;     // Más grande (4-10px)
        this.opacidad = 0.95;                   // Más opaco
        this.vida = 60 + Math.random() * 40;    // Más duración
      }
      
      actualizar() {
        this.xVirtual += this.vx;
        this.yVirtual += this.vy;
        this.radio *= 0.97;
        this.opacidad *= 0.96;
        this.vida--;
      }
      
      dibujar(ctx) {
        // AMARILLO DORADO BRILLANTE (visible en cualquier fondo)
        ctx.fillStyle = `rgba(255, 235, 59, ${this.opacidad * 0.8})`;
        ctx.beginPath();
        ctx.arc(virtualX(this.xVirtual), virtualY(this.yVirtual), virtualW(this.radio), 0, Math.PI * 2);
        ctx.fill();
      }
      
      estaMuerta() { return this.vida <= 0 || this.radio < 0.8; }
    }

    // ==================== FUNCIONES DEL JUEGO ====================
    function activarTrucoEuro() {
      if (jugador.trucoEuro.usado || jugador.pakiRicoh.activo || jugador.enEscenaFinal) return;
      
      jugador.trucoEuro.usado = true;
      juego.estado = 'pausado_truco';
      jugador.vidas++;
      vidasDisplay.textContent = jugador.vidas;
      
      // TEXTO INSTANTÁNEO EN CENTRO
      textosEmergentes.push(new TextoEmergente(
        "EURO", 
        CENTRO_X_VIRTUAL,
        CENTRO_Y_VIRTUAL,
        '#ffd700',
        { gigante: true, vibrar: true }
      ));
      
      sonidoEuro();
      
      setTimeout(() => {
        if (juego.estado === 'pausado_truco') juego.estado = 'jugando';
      }, 2000);
    }

    function generarObstaculo() {
      if (juego.contadorObstaculos >= juego.frecuenciaObstaculos) {
        const random = Math.random();
        
        if (random < 0.45) {
          const carril = Math.floor(Math.random() * 3);
          obstaculos.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 28,
            yVirtual: -90,
            anchoVirtual: 56,
            altoVirtual: 75,
            carril: carril,
            tipo: 'policia',
            velocidadExtra: 0,
            colorUniforme: '#2196f3',
            colorGorra: '#1565c0'
          });
        } else if (random < 0.67) {
          const carril = Math.floor(Math.random() * 3);
          obstaculos.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 28,
            yVirtual: -90,
            anchoVirtual: 56,
            altoVirtual: 75,
            carril: carril,
            tipo: 'policia',
            velocidadExtra: 1,
            colorUniforme: '#1565c0',
            colorGorra: '#0a3a75'
          });
        } else if (random < 0.75) {
          const carril = Math.floor(Math.random() * 3);
          cerdos.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 30,
            yVirtual: -70,
            anchoVirtual: 60,
            altoVirtual: 50,
            carril: carril,
            tipo: 'cerdo'
          });
        } else {
          const carril = Math.floor(Math.random() * 3);
          cigarros.push({
            xVirtual: POS_X_CARRIL_VIRTUAL[carril] - 22,
            yVirtual: -65,
            anchoVirtual: 44,
            altoVirtual: 30,
            carril: carril,
            tipo: 'cigarro',
            tiempoBrasa: 0
          });
        }
        
        juego.contadorObstaculos = 0;
      } else {
        juego.contadorObstaculos++;
      }
    }

    function moverObstaculos() {
      for (let i = obstaculos.length - 1; i >= 0; i--) {
        obstaculos[i].yVirtual += juego.velocidad + obstaculos[i].velocidadExtra;
        if (obstaculos[i].yVirtual > 700) obstaculos.splice(i, 1);
      }
      
      for (let i = cerdos.length - 1; i >= 0; i--) {
        cerdos[i].yVirtual += 1.5;
        if (cerdos[i].yVirtual > 700) cerdos.splice(i, 1);
      }
      
      for (let i = cigarros.length - 1; i >= 0; i--) {
        cigarros[i].yVirtual += juego.velocidad;
        cigarros[i].tiempoBrasa = (cigarros[i].tiempoBrasa + 1) % 20;
        if (cigarros[i].yVirtual > 700) cigarros.splice(i, 1);
      }
    }

    function detectarColisiones() {
      const jugadorXVirtual = POS_X_CARRIL_VIRTUAL[jugador.carril] - jugador.anchoVirtual / 2;
      const jugadorYVirtual = jugador.yVirtual - jugador.altoVirtual / 2;
      
      // Policías
      for (let i = obstaculos.length - 1; i >= 0; i--) {
        const obs = obstaculos[i];
        const obsXVirtual = obs.xVirtual;
        const obsYVirtual = obs.yVirtual - obs.altoVirtual / 2;
        
        if (jugador.pakiRicoh.activo) {
          if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                      obsXVirtual, obsYVirtual, obs.anchoVirtual, obs.altoVirtual)) {
            if (Math.random() < 0.3) {
              // TEXTO INSTANTÁNEO EN CENTRO
              textosEmergentes.push(new TextoEmergente("RECISTA", CENTRO_X_VIRTUAL, CENTRO_Y_VIRTUAL, '#ff4d4d'));
            }
          }
          continue;
        }
        
        if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                    obsXVirtual, obsYVirtual, obs.anchoVirtual, obs.altoVirtual)) {
          if (!jugador.invulnerable) {
            sonidoChoque();
            juego.choquesSinMorir++;
            
            if (juego.choquesSinMorir >= 3) {
              // TEXTO INSTANTÁNEO EN CENTRO
              textosEmergentes.push(new TextoEmergente("MI CARTERA¡", CENTRO_X_VIRTUAL, CENTRO_Y_VIRTUAL, '#ffd166', { gigante: true, vibrar: true }));
              juego.choquesSinMorir = 0;
            }
            
            // TEXTO INSTANTÁNEO EN CENTRO
            textosEmergentes.push(new TextoEmergente("RECISTA", CENTRO_X_VIRTUAL, CENTRO_Y_VIRTUAL, '#ff4d4d'));
            juego.pantallaRoja = 30;
            
            if (jugador.vidas > 1) {
              jugador.vidas--;
              vidasDisplay.textContent = jugador.vidas;
              jugador.invulnerable = true;
              jugador.tiempoInvulnerable = 90;
            } else {
              gameOver();
            }
          }
          obstaculos.splice(i, 1);
        }
      }
      
      // Cerdos
      for (let i = cerdos.length - 1; i >= 0; i--) {
        const cerdo = cerdos[i];
        const cerdoXVirtual = cerdo.xVirtual;
        const cerdoYVirtual = cerdo.yVirtual - cerdo.altoVirtual / 2;
        
        if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                    cerdoXVirtual, cerdoYVirtual, cerdo.anchoVirtual, cerdo.altoVirtual)) {
          if (!jugador.invulnerable) {
            sonidoCerdo();
            jugador.vidas--;
            vidasDisplay.textContent = jugador.vidas;
            
            // TEXTO INSTANTÁNEO EN CENTRO
            textosEmergentes.push(new TextoEmergente("YALLAH", CENTRO_X_VIRTUAL, CENTRO_Y_VIRTUAL, '#ff4d4d', { gigante: true, vibrar: true }));
            juego.pantallaRoja = 35;
            
            if (jugador.vidas <= 0) {
              gameOver();
            } else {
              jugador.invulnerable = true;
              jugador.tiempoInvulnerable = 90;
            }
          }
          cerdos.splice(i, 1);
        }
      }
      
      // Cigarros
      for (let i = cigarros.length - 1; i >= 0; i--) {
        const cig = cigarros[i];
        const cigXVirtual = cig.xVirtual;
        const cigYVirtual = cig.yVirtual - cig.altoVirtual / 2;
        
        if (colision(jugadorXVirtual, jugadorYVirtual, jugador.anchoVirtual, jugador.altoVirtual, 
                    cigXVirtual, cigYVirtual, cig.anchoVirtual, cig.altoVirtual)) {
          sonidoSuspiro();
          
          // TEXTO INSTANTÁNEO EN CENTRO
          textosEmergentes.push(new TextoEmergente("SEGARRO", CENTRO_X_VIRTUAL, CENTRO_Y_VIRTUAL, '#ffd166'));
          
          jugador.cigarros++;
          juego.totalCigarrosReales++;
          cigarrosDisplay.textContent = jugador.cigarros;
          
          if (jugador.cigarros >= 5) {
            jugador.vidas++;
            jugador.cigarros = 0;
            cigarrosDisplay.textContent = jugador.cigarros;
            vidasDisplay.textContent = jugador.vidas;
            
            // TEXTO INSTANTÁNEO EN CENTRO
            textosEmergentes.push(new TextoEmergente("AMIGOO", CENTRO_X_VIRTUAL, CENTRO_Y_VIRTUAL, '#ffd700', { gigante: true, vibrar: true }));
          }
          
          if (juego.totalCigarrosReales % 10 === 0 && juego.totalCigarrosReales > 0) {
            activarPakiRicoh();
          }
          
          cigarros.splice(i, 1);
        }
      }
    }

    function colision(x1, y1, w1, h1, x2, y2, w2, h2) {
      return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
    }

    function activarPakiRicoh() {
      jugador.pakiRicoh.activo = true;
      jugador.pakiRicoh.contador = 0;
      jugador.pakiRicoh.humoParticulas = [];
      
      // TEXTO INSTANTÁNEO EN CENTRO
      textosEmergentes.push(new TextoEmergente("¡PAKI RICOH!", CENTRO_X_VIRTUAL, CENTRO_Y_VIRTUAL, '#ffd700', { gigante: true, vibrar: true }));
      
      if (audioContext) {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.type = 'sine';
        osc.frequency.value = 600;
        gain.gain.value = 0.35;
        osc.start();
        osc.stop(audioContext.currentTime + 0.4);
      }
    }

    function actualizarPakiRicoh() {
      if (!jugador.pakiRicoh.activo) return;
      
      jugador.pakiRicoh.contador++;
      
      // Generar partículas de humo (más grandes y visibles)
      if (jugador.pakiRicoh.humoParticulas.length < 50 && Math.random() < 0.5) {
        jugador.pakiRicoh.humoParticulas.push(new ParticulaHumo(
          POS_X_CARRIL_VIRTUAL[jugador.carril] + (Math.random() - 0.5) * 30,  // Más dispersión
          jugador.yVirtual - 20 + Math.random() * 15  // Más altura
        ));
      }
      
      // Actualizar partículas
      for (let i = jugador.pakiRicoh.humoParticulas.length - 1; i >= 0; i--) {
        jugador.pakiRicoh.humoParticulas[i].actualizar();
        if (jugador.pakiRicoh.humoParticulas[i].estaMuerta()) {
          jugador.pakiRicoh.humoParticulas.splice(i, 1);
        }
      }
      
      // ELIMINADO: Movimiento automático de carril (el jugador mantiene control total)
      
      // Terminar después de 450 frames (7.5 segundos)
      if (jugador.pakiRicoh.contador >= jugador.pakiRicoh.duracion) {
        terminarPakiRicoh();
      }
    }

    function terminarPakiRicoh() {
      jugador.pakiRicoh.activo = false;
      jugador.pakiRicoh.humoParticulas = [];
      
      // Asegurar que el carril esté en rango válido (0, 1 o 2)
      jugador.carril = Math.round(Math.max(0, Math.min(2, jugador.carril)));
      
      // Restaurar invulnerabilidad
      jugador.invulnerable = false;
      
      // TEXTO INSTANTÁNEO EN CENTRO
      textosEmergentes.push(new TextoEmergente("..", CENTRO_X_VIRTUAL, CENTRO_Y_VIRTUAL, '#ffffff'));
      sonidoTos();
    }

    function actualizarJugador() {
      if (juego.pantallaRoja > 0) juego.pantallaRoja--;
      
      if (!jugador.enSuelo) {
        jugador.vy += jugador.gravedad;
        jugador.yVirtual += jugador.vy;
        if (jugador.yVirtual >= POS_Y_BASE_VIRTUAL) {
          jugador.yVirtual = POS_Y_BASE_VIRTUAL;
          jugador.vy = 0;
          jugador.enSuelo = true;
          jugador.saltando = false;
        }
      }
      
      if (jugador.invulnerable) {
        jugador.tiempoInvulnerable--;
        if (jugador.tiempoInvulnerable <= 0) jugador.invulnerable = false;
      }
      
      if (jugador.agachado && !jugador.enSuelo) {
        jugador.agachado = false;
        jugador.altoVirtual = 65;
      }
      
      actualizarPakiRicoh();
    }

    function actualizarDificultad() {
      juego.score++;
      scoreDisplay.textContent = `SCORE: ${juego.score}`;
      
      juego.velocidad = 4.8;
      if (juego.score >= 1000) juego.velocidad += 0.6;
      if (juego.score >= 2000) juego.velocidad += 0.6;
      if (juego.score >= 3500) juego.velocidad += 0.6;
      if (juego.score >= 5500) juego.velocidad += 0.6;
      if (juego.score >= 8000) juego.velocidad += 0.6;
      if (juego.score >= 11000) juego.velocidad += 0.6;
      if (juego.score >= 15000) juego.velocidad += 0.6;
      
      if (juego.score >= 30000 && juego.estado !== 'final') {
        escenaFinal();
        return;
      }
      
      if (juego.score % 1200 === 0 && juego.frecuenciaObstaculos > 40) {
        juego.frecuenciaObstaculos -= 6;
      }
    }

    function actualizarTextos() {
      for (let i = textosEmergentes.length - 1; i >= 0; i--) {
        textosEmergentes[i].actualizar();
        if (textosEmergentes[i].estaMuerto()) textosEmergentes.splice(i, 1);
      }
    }

    function escenaFinal() {
      juego.estado = 'final';
      jugador.enEscenaFinal = true;
      stopMusicaArabe();
      
      if (audioContext) {
        const notas = [110, 130.81, 146.83];
        let indice = 0;
        function tocar() {
          if (!audioContext) return;
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.connect(gain);
          gain.connect(audioContext.destination);
          osc.type = 'sine';
          osc.frequency.value = notas[indice];
          gain.gain.value = 0.08;
          osc.start();
          osc.stop(audioContext.currentTime + 1.2);
          gain.gain.setValueAtTime(0.08, audioContext.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 1.2);
          indice = (indice + 1) % notas.length;
          setTimeout(tocar, 1800);
        }
        tocar();
      }
      
      jugador.amigos = [];
      const posiciones = [
        { x: 300, y: 410, colorPiel: '#795548', colorRopa: '#d32f2f' },
        { x: 360, y: 425, colorPiel: '#5d4037', colorRopa: '#1976d2' },
        { x: 440, y: 425, colorPiel: '#8d6e63', colorRopa: '#388e3c' },
        { x: 500, y: 410, colorPiel: '#6d4c41', colorRopa: '#f57c00' },
        { x: 400, y: 450, colorPiel: '#5d4037', colorRopa: '#7b1fa2' }
      ];
      
      posiciones.forEach(pos => {
        jugador.amigos.push({
          xVirtual: pos.x,
          yVirtual: pos.y,
          colorPiel: pos.colorPiel,
          colorRopa: pos.colorRopa
        });
      });
    }

    function gameOver() {
      juego.estado = 'gameover';
      
      if (juego.score > juego.record) {
        juego.record = juego.score;
        localStorage.setItem('segarroRecord', juego.record.toString());
        recordDisplay.textContent = `RÉCORD: ${juego.record}`;
      }
      
      finalScoreDisplay.textContent = `SCORE: ${juego.score}`;
      bestRecordDisplay.textContent = `MEJOR RÉCORD: ${juego.record}`;
      gameOverPanel.style.display = 'block';
      
      if (audioContext) {
        const osc1 = audioContext.createOscillator();
        const osc2 = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioContext.destination);
        osc1.frequency.value = 650;
        osc2.frequency.value = 850;
        gain.gain.value = 0.2;
        osc1.start();
        osc2.start();
        
        let asc = true;
        const int = setInterval(() => {
          if (!audioContext) { clearInterval(int); return; }
          osc1.frequency.value = asc ? 850 : 650;
          osc2.frequency.value = asc ? 1050 : 850;
          asc = !asc;
        }, 300);
        
        setTimeout(() => {
          clearInterval(int);
          osc1.stop();
          osc2.stop();
        }, 2500);
      }
      
      stopMusicaArabe();
    }

    function reiniciarJuego() {
      juego.estado = 'jugando';
      juego.score = 0;
      juego.velocidad = juego.velocidadBase;
      juego.frecuenciaObstaculos = 90;
      juego.contadorObstaculos = 0;
      juego.pantallaRoja = 0;
      juego.choquesSinMorir = 0;
      
      jugador.carril = CARRILES.CENTRO;
      jugador.yVirtual = POS_Y_BASE_VIRTUAL;
      jugador.vy = 0;
      jugador.saltando = false;
      jugador.agachado = false;
      jugador.enSuelo = true;
      jugador.vidas = 1;
      jugador.cigarros = 0;
      jugador.invulnerable = false;
      jugador.tiempoInvulnerable = 0;
      jugador.trucoEuro = { usado: false };
      jugador.pakiRicoh = { activo: false, contador: 0, duracion: 450, humoParticulas: [] };
      jugador.enEscenaFinal = false;
      jugador.amigos = [];
      
      obstaculos.length = 0;
      cigarros.length = 0;
      cerdos.length = 0;
      textosEmergentes.length = 0;
      
      // Reset contador EURO
      resetContadorEURO();
      
      scoreDisplay.textContent = `SCORE: 0`;
      vidasDisplay.textContent = jugador.vidas;
      cigarrosDisplay.textContent = jugador.cigarros;
      
      gameOverPanel.style.display = 'none';
      
      if (audioHabilitado) startMusicaArabe();
    }

    // ==================== RENDERIZADO ====================
    function dibujarFondo() {
      ctx.save();
      ctx.scale(scaleX, scaleY);
      
      const grad = ctx.createLinearGradient(0, 0, 0, 600);
      grad.addColorStop(0, '#0f0c29');
      grad.addColorStop(0.4, '#1a1a2e');
      grad.addColorStop(0.7, '#162447');
      grad.addColorStop(1, '#0f3460');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 800, 600);
      
      ctx.fillStyle = '#2d3142';
      dibujarMontanas(0.3, 0, 250, 200, 350, 200, 400, 300, 600, 200, 800, 300);
      ctx.fillStyle = '#1e2736';
      dibujarMontanas(0.6, 0, 300, 150, 250, 350, 150, 550, 250, 750, 300, 800, 400);
      ctx.fillStyle = '#141e2b';
      dibujarMontanas(0.9, 0, 400, 100, 300, 400, 100, 600, 300, 800, 400, 800, 600);
      
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      for (let i = 0; i < 5; i++) {
        const x = (juego.tiempo * 0.1 + i * 200) % 1000 - 100;
        const y = 80 + Math.sin(juego.tiempo * 0.05 + i) * 20;
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, Math.PI * 2);
        ctx.arc(x + 25, y - 10, 25, 0, Math.PI * 2);
        ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
      ctx.lineWidth = 3;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(i * 200, 0);
        ctx.lineTo(i * 200, 600);
        ctx.stroke();
      }
      
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
      ctx.setLineDash([20, 15]);
      ctx.beginPath();
      ctx.moveTo(400, 0);
      ctx.lineTo(400, 600);
      ctx.stroke();
      ctx.setLineDash([]);
      
      ctx.strokeStyle = 'rgba(255, 209, 102, 0.4)';
      ctx.lineWidth = 3;
      for (let i = 0; i < 20; i++) {
        const y = (juego.tiempo * juego.velocidad * 0.3 + i * 35) % 600;
        ctx.beginPath();
        ctx.moveTo(340, y);
        ctx.lineTo(460, y);
        ctx.stroke();
      }
      
      ctx.restore();
    }

    function dibujarMontanas(factor, ...puntos) {
      ctx.beginPath();
      ctx.moveTo(puntos[0], puntos[1]);
      for (let i = 2; i < puntos.length; i += 2) {
        ctx.lineTo(puntos[i], puntos[i+1]);
      }
      ctx.lineTo(800, 600);
      ctx.lineTo(0, 600);
      ctx.fill();
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.beginPath();
      ctx.moveTo(puntos[0], puntos[1]);
      for (let i = 2; i < puntos.length; i += 2) {
        ctx.lineTo(puntos[i], puntos[i+1] + 10);
      }
      ctx.lineTo(800, 600);
      ctx.lineTo(0, 600);
      ctx.fill();
    }

        for (let i = 0; i < 4; i++) {
          const size = 6 + i * 2.5;
          const opacity = 0.85 - i * 0.2;
          const yOffset = -45 - i * 18 + Math.sin(juego.tiempo * 0.07 + i) * 3;
          const xOffset = 25 + Math.sin(juego.tiempo * 0.1 + i * 2) * 2;
          
          ctx.globalAlpha = opacity;
          ctx.fillStyle = `rgba(230, 230, 230, ${opacity})`;
          ctx.beginPath();
          ctx.arc(x + xOffset, y + yOffset, size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1.0;
        
        jugador.amigos.forEach(amigo => {
          ctx.fillStyle = amigo.colorRopa;
          ctx.beginPath();
          ctx.arc(amigo.xVirtual, amigo.yVirtual - 15, 18, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.fillStyle = amigo.colorPiel;
          ctx.beginPath();
          ctx.arc(amigo.xVirtual, amigo.yVirtual - 35, 12, 0, Math.PI * 2);
          ctx.fill();
          
          ctx.fillStyle = '#2e1b1b';
          ctx.fillRect(amigo.xVirtual - 6, amigo.yVirtual - 38, 3, 2);
          ctx.fillRect(amigo.xVirtual + 3, amigo.yVirtual - 38, 3, 2);
          ctx.beginPath();
          ctx.arc(amigo.xVirtual, amigo.yVirtual - 33, 3, Math.PI, 2 * Math.PI);
          ctx.stroke();
        });
        
        const creditY = 680 - (juego.tiempo % 2000) * 0.65;
        ctx.font = 'bold 30px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffd166';
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.lineWidth = 5;
        ctx.strokeText("ESTE ES DEL BUENO", 400, creditY);
        ctx.fillText("ESTE ES DEL BUENO", 400, creditY);
        ctx.strokeText("RESINA PEGAJOSA", 400, creditY + 50);
        ctx.fillText("RESINA PEGAJOSA", 400, creditY + 50);
        
        ctx.font = 'bold 24px "Courier New", monospace';
        ctx.fillStyle = '#a5d6a7';
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.lineWidth = 4;
        ctx.strokeText("la paz del segarrero", 400, 90);
        ctx.fillText("la paz del segarrero", 400, 90);
        
        ctx.restore();
        return;
      }
      
      // ¡CRÍTICO! Guardar estado del contexto ANTES de aplicar efectos
      ctx.save();
      
      const xVirtual = POS_X_CARRIL_VIRTUAL[jugador.carril] - jugador.anchoVirtual / 2;
      const yVirtual = jugador.yVirtual;
      
      // Efectos visuales PAKI RICOH (SEGURIDAD MÁXIMA)
      if (jugador.pakiRicoh.activo) {
        // Sombra dorada intensa
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 40 * dpr;
        
        // Parpadeo sutil usando globalAlpha (seguro)
        if (Math.floor(juego.tiempo / 15) % 2 === 0) {
          ctx.globalAlpha = 0.95;
        }
      }
      
      if (jugador.invulnerable && Math.floor(Date.now() / 100) % 2 === 0) {
        ctx.globalAlpha = 0.7;
      }
      
      // Dibujar cuerpo del jugador
      ctx.fillStyle = jugador.colorRopa;
      ctx.beginPath();
      ctx.moveTo(xVirtual + 5, yVirtual - jugador.altoVirtual);
      ctx.lineTo(xVirtual + jugador.anchoVirtual - 5, yVirtual - jugador.altoVirtual);
      ctx.lineTo(xVirtual + jugador.anchoVirtual - 5, yVirtual - 15);
      ctx.lineTo(xVirtual + jugador.anchoVirtual - 15, yVirtual);
      ctx.lineTo(xVirtual + 15, yVirtual);
      ctx.lineTo(xVirtual + 5, yVirtual - 15);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.beginPath();
      ctx.moveTo(xVirtual + 10, yVirtual - jugador.altoVirtual + 10);
      ctx.lineTo(xVirtual + jugador.anchoVirtual - 10, yVirtual - jugador.altoVirtual + 10);
      ctx.lineTo(xVirtual + jugador.anchoVirtual - 12, yVirtual - 25);
      ctx.lineTo(xVirtual + 12, yVirtual - 25);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = '#4e342e';
      ctx.beginPath();
      ctx.arc(xVirtual + jugador.anchoVirtual / 2, yVirtual - jugador.altoVirtual - 5, 16, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = jugador.colorPiel;
      ctx.beginPath();
      ctx.arc(xVirtual + jugador.anchoVirtual / 2, yVirtual - jugador.altoVirtual - 5, 14, 0, Math.PI * 2);
      ctx.fill();
      
      if (jugador.pakiRicoh.activo) {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(xVirtual + 10, yVirtual - jugador.altoVirtual - 12, 15, 7);
        ctx.fillRect(xVirtual + 10, yVirtual - jugador.altoVirtual - 12, 4, 7);
        ctx.fillRect(xVirtual + 21, yVirtual - jugador.altoVirtual - 12, 4, 7);
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(xVirtual + 11, yVirtual - jugador.altoVirtual - 11, 2, 5);
        ctx.fillRect(xVirtual + 22, yVirtual - jugador.altoVirtual - 11, 2, 5);
      } else {
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(xVirtual + 12, yVirtual - jugador.altoVirtual - 8, 4, 0, Math.PI * 2);
        ctx.arc(xVirtual + 23, yVirtual - jugador.altoVirtual - 8, 4, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = 'black';
        ctx.beginPath();
        ctx.arc(xVirtual + 12 + Math.sin(juego.tiempo / 10) * 0.5, yVirtual - jugador.altoVirtual - 8, 2, 0, Math.PI * 2);
        ctx.arc(xVirtual + 23 + Math.sin(juego.tiempo / 10) * 0.5, yVirtual - jugador.altoVirtual - 8, 2, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(xVirtual + 17.5, yVirtual - jugador.altoVirtual - 3, 5, Math.PI, 2 * Math.PI);
        ctx.stroke();
      }
      
      const offsetBrazos = Math.sin(juego.tiempo / 4) * 18;
      ctx.fillStyle = jugador.colorPiel;
      
      if (jugador.agachado) {
        ctx.fillRect(xVirtual - 10, yVirtual - 35, 10, 25);
        ctx.fillRect(xVirtual + jugador.anchoVirtual, yVirtual - 35, 10, 25);
      } else if (jugador.saltando) {
        ctx.fillRect(xVirtual - 12, yVirtual - jugador.altoVirtual - 15, 12, 30);
        ctx.fillRect(xVirtual + jugador.anchoVirtual, yVirtual - jugador.altoVirtual - 15, 12, 30);
      } else {
        ctx.fillRect(xVirtual - 12, yVirtual - 45 + offsetBrazos, 12, 30);
        ctx.fillRect(xVirtual + jugador.anchoVirtual, yVirtual - 45 - offsetBrazos, 12, 30);
      }
      
      ctx.fillStyle = '#1a237e';
      const offsetPiernas = Math.sin(juego.tiempo / 4) * 12;
      
      if (jugador.agachado) {
        ctx.fillRect(xVirtual + 8, yVirtual - 25, 10, 30);
        ctx.fillRect(xVirtual + 17, yVirtual - 25, 10, 30);
      } else {
        ctx.fillRect(xVirtual + 8, yVirtual - 20 + offsetPiernas, 8, 25);
        ctx.fillRect(xVirtual + 19, yVirtual - 20 - offsetPiernas, 8, 25);
        ctx.fillRect(xVirtual + 9, yVirtual + 5 + offsetPiernas, 6, 22);
        ctx.fillRect(xVirtual + 20, yVirtual + 5 - offsetPiernas, 6, 22);
      }
      
      ctx.fillStyle = jugador.colorZapatos;
      ctx.fillRect(xVirtual + 7, yVirtual + 27, 10, 8);
      ctx.fillRect(xVirtual + 18, yVirtual + 27, 10, 8);
      ctx.fillStyle = '#424242';
      ctx.fillRect(xVirtual + 8, yVirtual + 32, 8, 3);
      ctx.fillRect(xVirtual + 19, yVirtual + 32, 8, 3);
      
      // Dibujar aura dorada ALREDEDOR del jugador (después del cuerpo)
      if (jugador.pakiRicoh.activo) {
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 4;
        ctx.strokeRect(
          virtualX(xVirtual - 5),
          virtualY(yVirtual - jugador.altoVirtual - 10),
          virtualW(jugador.anchoVirtual + 10),
          virtualH(jugador.altoVirtual + 10)
        );
      }
      
      // ¡CRÍTICO! Restaurar estado del contexto DESPUÉS de dibujar
      ctx.restore();
    }

    function dibujarPolicia(obs) {
      ctx.save();
      ctx.scale(scaleX, scaleY);
      
      const xVirtual = obs.xVirtual;
      const yVirtual = obs.yVirtual;
      
      ctx.fillStyle = obs.colorUniforme;
      ctx.beginPath();
      ctx.moveTo(xVirtual + 8, yVirtual - 70);
      ctx.lineTo(xVirtual + 47, yVirtual - 70);
      ctx.lineTo(xVirtual + 45, yVirtual);
      ctx.lineTo(xVirtual + 10, yVirtual);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = '#ffc107';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(xVirtual + 28, yVirtual - 50 + i * 12, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.fillStyle = obs.colorGorra;
      ctx.fillRect(xVirtual + 12, yVirtual - 85, 31, 12);
      ctx.beginPath();
      ctx.moveTo(xVirtual + 10, yVirtual - 73);
      ctx.lineTo(xVirtual + 50, yVirtual - 73);
      ctx.lineTo(xVirtual + 45, yVirtual - 80);
      ctx.lineTo(xVirtual + 15, yVirtual - 80);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(xVirtual + 15, yVirtual - 75, 25, 15);
      
      ctx.fillStyle = 'black';
      ctx.fillRect(xVirtual + 20, yVirtual - 70, 3, 3);
      ctx.fillRect(xVirtual + 32, yVirtual - 70, 3, 3);
      
      ctx.beginPath();
      ctx.moveTo(xVirtual + 19, yVirtual - 67);
      ctx.lineTo(xVirtual + 23, yVirtual - 69);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(xVirtual + 31, yVirtual - 67);
      ctx.lineTo(xVirtual + 35, yVirtual - 69);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(xVirtual + 22, yVirtual - 63);
      ctx.lineTo(xVirtual + 33, yVirtual - 63);
      ctx.stroke();
      
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(xVirtual - 5, yVirtual - 60, 10, 35);
      ctx.fillRect(xVirtual + 50, yVirtual - 60, 10, 35);
      
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(xVirtual - 10, yVirtual - 40, 8, 25);
      ctx.fillStyle = '#424242';
      ctx.fillRect(xVirtual - 12, yVirtual - 45, 12, 5);
      
      ctx.fillStyle = '#0d47a1';
      ctx.fillRect(xVirtual + 15, yVirtual - 10, 10, 30);
      ctx.fillRect(xVirtual + 30, yVirtual - 10, 10, 30);
      
      ctx.fillStyle = '#212121';
      ctx.fillRect(xVirtual + 13, yVirtual + 20, 14, 8);
      ctx.fillRect(xVirtual + 28, yVirtual + 20, 14, 8);
      
      ctx.fillStyle = '#ffc107';
      ctx.beginPath();
      ctx.arc(xVirtual + 45, yVirtual - 60, 3, 0, Math.PI * 2);
      ctx.fill();
      
      if (obs.velocidadExtra > 0) {
        ctx.fillStyle = '#ff4d4d';
        ctx.font = 'bold 13px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('RAPIDO', xVirtual + 28, yVirtual - 92);
      }
      
      ctx.restore();
    }

    function dibujarCerdo(cerdo) {
      ctx.save();
      ctx.scale(scaleX, scaleY);
      
      const xVirtual = cerdo.xVirtual;
      const yVirtual = cerdo.yVirtual;
      
      ctx.fillStyle = '#ff80ab';
      ctx.beginPath();
      ctx.ellipse(xVirtual + 30, yVirtual - 25, 32, 25, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.beginPath();
      ctx.ellipse(xVirtual + 30, yVirtual - 15, 28, 15, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#ff80ab';
      ctx.beginPath();
      ctx.arc(xVirtual + 30, yVirtual - 45, 20, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#e91e63';
      ctx.beginPath();
      ctx.arc(xVirtual + 30, yVirtual - 40, 12, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.arc(xVirtual + 26, yVirtual - 42, 2.5, 0, Math.PI * 2);
      ctx.arc(xVirtual + 34, yVirtual - 42, 2.5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(xVirtual + 23, yVirtual - 48, 4, 0, Math.PI * 2);
      ctx.arc(xVirtual + 37, yVirtual - 48, 4, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.arc(xVirtual + 24, yVirtual - 48, 2, 0, Math.PI * 2);
      ctx.arc(xVirtual + 36, yVirtual - 48, 2, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.strokeStyle = 'black';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(xVirtual + 20, yVirtual - 52);
      ctx.lineTo(xVirtual + 26, yVirtual - 50);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(xVirtual + 34, yVirtual - 50);
      ctx.lineTo(xVirtual + 40, yVirtual - 52);
      ctx.stroke();
      
      ctx.fillStyle = '#ff80ab';
      ctx.beginPath();
      ctx.arc(xVirtual + 18, yVirtual - 55, 9, 0.3 * Math.PI, 1.7 * Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(xVirtual + 42, yVirtual - 55, 9, 0.3 * Math.PI, 1.7 * Math.PI);
      ctx.fill();
      
      ctx.fillStyle = '#ff4d4d';
      ctx.beginPath();
      ctx.arc(xVirtual + 18, yVirtual - 55, 5, 0.3 * Math.PI, 1.7 * Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(xVirtual + 42, yVirtual - 55, 5, 0.3 * Math.PI, 1.7 * Math.PI);
      ctx.fill();
      
      ctx.fillStyle = '#e91e63';
      ctx.fillRect(xVirtual + 15, yVirtual - 5, 12, 18);
      ctx.fillRect(xVirtual + 33, yVirtual - 5, 12, 18);
      
      ctx.fillStyle = '#880e4f';
      ctx.fillRect(xVirtual + 17, yVirtual + 10, 8, 5);
      ctx.fillRect(xVirtual + 35, yVirtual + 10, 8, 5);
      
      ctx.strokeStyle = '#e91e63';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(xVirtual + 55, yVirtual - 30);
      ctx.bezierCurveTo(
        xVirtual + 65, yVirtual - 25,
        xVirtual + 62, yVirtual - 15,
        xVirtual + 55, yVirtual - 10
      );
      ctx.stroke();
      
      ctx.restore();
    }

    function dibujarCigarro(cig) {
      ctx.save();
      ctx.scale(scaleX, scaleY);
      
      const xVirtual = cig.xVirtual;
      const yVirtual = cig.yVirtual;
      
      ctx.fillStyle = '#8d6e63';
      ctx.fillRect(xVirtual + 8, yVirtual - 25, 28, 18);
      
      ctx.strokeStyle = 'rgba(100, 80, 70, 0.5)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(xVirtual + 10, yVirtual - 23 + i * 4);
        ctx.lineTo(xVirtual + 34, yVirtual - 23 + i * 4);
        ctx.stroke();
      }
      
      ctx.fillStyle = '#9e9e9e';
      ctx.beginPath();
      ctx.arc(xVirtual + 15, yVirtual - 30, 6, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.beginPath();
      ctx.arc(xVirtual + 14, yVirtual - 31, 2, 0, Math.PI * 2);
      ctx.fill();
      
      const brillo = 0.7 + Math.sin(cig.tiempoBrasa * 0.3) * 0.3;
      ctx.fillStyle = `rgba(255, 152, 0, ${brillo})`;
      ctx.beginPath();
      ctx.arc(xVirtual + 38, yVirtual - 30, 5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = `rgba(255, 235, 59, ${brillo * 0.8})`;
      ctx.beginPath();
      ctx.arc(xVirtual + 39, yVirtual - 31, 2, 0, Math.PI * 2);
      ctx.fill();
      
      if (Math.random() > 0.7 && !jugador.pakiRicoh.activo) {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = 'rgba(220, 220, 220, 0.6)';
        ctx.beginPath();
        ctx.arc(xVirtual + 38, yVirtual - 38, 3 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
      
      ctx.restore();
    }

    function dibujarObstaculos() {
      obstaculos.forEach(obs => dibujarPolicia(obs));
      cerdos.forEach(cerdo => dibujarCerdo(cerdo));
      cigarros.forEach(cig => dibujarCigarro(cig));
    }

    function dibujarParticulasPakiRicoh() {
      if (jugador.pakiRicoh.activo) {
        ctx.save();
        ctx.scale(scaleX, scaleY);
        jugador.pakiRicoh.humoParticulas.forEach(p => p.dibujar(ctx));
        ctx.restore();
      }
    }

    // ¡¡¡CORRECCIÓN CRÍTICA!!! - Eliminar doble escalado en textos
    function dibujarTextos() {
      // ctx.save() y ctx.scale() ELIMINADOS para evitar doble escalado
      textosEmergentes.forEach(t => t.dibujar(ctx));
    }

    function dibujarEfectoPantallaRoja() {
      if (juego.pantallaRoja > 0) {
        ctx.fillStyle = `rgba(255, 50, 50, ${juego.pantallaRoja / 50})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function actualizarIndicadorCarril() {
      if (jugador.enEscenaFinal) return;
      
      const posicionesX = [
        virtualX(170),
        virtualX(370),
        virtualX(570)
      ];
      carrilIndicator.style.left = `${posicionesX[jugador.carril]}px`;
      
      if (jugador.carrilCambiado) {
        carrilIndicator.style.width = '7vw';
        setTimeout(() => {
          carrilIndicator.style.width = '5vw';
        }, 200);
        jugador.carrilCambiado = false;
      }
    }

    // ==================== BUCLE PRINCIPAL ====================
    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (juego.estado === 'jugando' || juego.estado === 'pausado_truco') {
        actualizarJugador();
        
        if (juego.estado === 'jugando' && !jugador.enEscenaFinal) {
          generarObstaculo();
          moverObstaculos();
          detectarColisiones();
          actualizarDificultad();
        }
        
        actualizarTextos();
        actualizarIndicadorCarril();
        
        juego.tiempo++;
      }
      
      if (juego.estado !== 'gameover') {
        dibujarFondo();
        if (!jugador.enEscenaFinal) {
          dibujarObstaculos();
          dibujarParticulasPakiRicoh();
        }
        dibujarJugador();
        dibujarTextos();
        dibujarEfectoPantallaRoja();
      }
      
      requestAnimationFrame(gameLoop);
    }

    // ==================== INICIAR ====================
    startBtn.addEventListener('click', () => {
      titleScreen.style.display = 'none';
      juego.estado = 'jugando';
      initAudio();
    });
    
    restartBtn.addEventListener('click', reiniciarJuego);
    
    titleScreen.addEventListener('touchmove', (e) => {}, { passive: true });
    
    gameLoop();
  </script>
</body>
</html>
